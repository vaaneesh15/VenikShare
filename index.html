<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatX</title>
    
    <!-- PWA метатеги -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ChatX">
    <meta name="theme-color" id="theme-color-meta" content="#4a3aff">
    <link rel="manifest" href="manifest.json">
    
    <!-- Socket.IO и Font Awesome -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* Все стили как в предыдущей рабочей версии (без изменений) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        body {
            --bg-gradient-start: #e9e9f0;
            --bg-gradient-end: #dadde8;
            --container-bg: rgba(240, 240, 245, 0.7);
            --container-border: rgba(255,255,255,0.5);
            --text-primary: #1a1a2e;
            --text-secondary: #2c3e50;
            --text-muted: #6b6b80;
            --accent: #4a3aff;
            --accent-light: #7a6aff;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(255,255,255,0.6);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            --icon-bg: white;
            --panel-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(255, 255, 255, 0.5);
            --chat-own-bg: var(--accent);
            --chat-other-bg: #e0e0f0;
            --chat-own-text: white;
            --chat-other-text: #1a1a2e;
            --unread-dot: #ff4444;
            --unread-dot-border: #ffffff;
            transition: background 0.2s, color 0.2s;
            
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end)) fixed;
            position: relative;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50vh;
            left: -50vw;
            width: 200vw;
            height: 200vh;
            background: inherit;
            z-index: -1;
        }

        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-bg: rgba(30, 30, 46, 0.8);
            --container-border: rgba(255,255,255,0.15);
            --text-primary: #f0f0ff;
            --text-secondary: #ecf0f1;
            --text-muted: #8a8aa0;
            --accent: #6d5fff;
            --accent-light: #9a8cff;
            --card-bg: rgba(40, 40, 55, 0.7);
            --card-border: rgba(255,255,255,0.1);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --icon-bg: #2a2a40;
            --panel-bg: rgba(30, 30, 46, 0.8);
            --input-bg: rgba(40, 40, 55, 0.6);
            --chat-other-bg: #3a3a5a;
            --chat-other-text: #ffffff;
            --unread-dot: #ff6b6b;
            --unread-dot-border: #1a1a2e;
        }

        /* Анимация нажатия */
        .btn,
        .nav-item,
        .room-item,
        .back-btn,
        .theme-toggle,
        .participant-count,
        .info-btn,
        .edit-btn,
        .room-edit-btn,
        .room-delete-btn,
        #public-send,
        #private-chat-send,
        #create-room-btn,
        #auth-login,
        #auth-register,
        #logout-btn,
        #delete-account-btn,
        .modal .btn,
        .attach-btn {
            transition: transform 0.1s ease, opacity 0.1s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }

        .btn:active,
        .nav-item:active,
        .room-item:active,
        .back-btn:active,
        .theme-toggle:active,
        .participant-count:active,
        .info-btn:active,
        .edit-btn:active,
        .room-edit-btn:active,
        .room-delete-btn:active,
        #public-send:active,
        #private-chat-send:active,
        #create-room-btn:active,
        #auth-login:active,
        #auth-register:active,
        #logout-btn:active,
        #delete-account-btn:active,
        .modal .btn:active,
        .attach-btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .app {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent;
            display: flex;
            flex-direction: column;
        }

        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .screen-hidden {
            opacity: 0;
            pointer-events: none;
        }

        #main-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .screen-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .inner-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .inner-screen-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .page-header, .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: max(24px, env(safe-area-inset-top)) 16px 12px 16px;
            border-bottom: 1px solid var(--container-border);
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            flex-shrink: 0;
            min-height: 68px;
        }
        .page-header h2, .chat-header-left h2 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }
        .theme-toggle {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 20px;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-left .back-btn {
            background: var(--icon-bg);
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 20px;
        }
        .participant-count {
            background: var(--icon-bg);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--card-border);
            cursor: pointer;
        }
        .info-btn {
            background: var(--icon-bg);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--card-border);
            cursor: pointer;
        }

        /* Нижняя навигация */
        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            margin: 8px 16px 16px 16px;
            padding: 6px 8px 8px 8px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid var(--container-border);
            box-shadow: var(--shadow);
            flex-shrink: 0;
            width: auto;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            padding: 8px 0;
            transition: background-color 0.2s, color 0.2s;
            border-radius: 30px;
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 2px;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(74, 58, 255, 0.1);
        }

        body.dark .nav-item.active {
            background: rgba(109, 95, 255, 0.2);
        }

        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 16px;
            border: 1px solid var(--container-border);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .input-group input, .input-group select {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
        }
        .input-group input::placeholder {
            color: var(--text-muted);
        }
        .btn {
            background: var(--icon-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .status {
            text-align: center;
            color: var(--text-muted);
            margin: 8px 0;
            font-size: 14px;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 34px;
            transition: .2s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 2px;
            background-color: var(--accent);
            border-radius: 50%;
            transition: .2s;
        }
        input:checked + .slider {
            background-color: var(--accent-light);
        }
        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: white;
        }

        .room-list {
            list-style: none;
        }
        .room-item {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px solid var(--card-border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .room-name {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 16px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .room-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .room-unread-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--unread-dot);
            border: 2px solid var(--unread-dot-border);
            display: inline-block;
        }
        .room-edit-btn, .room-delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        .message {
            display: flex;
            margin-bottom: 4px;
            position: relative;
        }
        .message-own {
            justify-content: flex-end;
        }
        .message-bubble {
            max-width: 80%;
            background: var(--chat-other-bg);
            border-radius: 24px;
            padding: 10px 16px;
            border: 1px solid var(--card-border);
            word-break: break-word;
            color: var(--chat-other-text);
        }
        .message-bubble-own {
            background: var(--chat-own-bg);
            color: var(--chat-own-text);
            border-color: var(--accent-light);
        }
        .message-sender {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent);
        }
        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }
        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        .message-media {
            max-width: 200px;
            max-height: 200px;
            border-radius: 16px;
            cursor: pointer;
        }
        .message-media video, .message-media audio {
            max-width: 200px;
            max-height: 200px;
        }
        .message-download-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.5);
            color: white;
            border-radius: 20px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            font-size: 16px;
            z-index: 2;
        }
        .message-download-btn:hover {
            background: rgba(0,0,0,0.7);
        }

        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px 12px 16px;
            border-top: 1px solid var(--container-border);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }
        .chat-input-area textarea {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 12px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }
        .chat-input-area button {
            width: 48px;
            height: 48px;
            border-radius: 30px;
            padding: 0;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .attach-btn {
            background: var(--icon-bg);
            border: 1px solid var(--card-border);
            color: var(--accent);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            padding: 24px;
            max-width: 90%;
            width: 400px;
            border: 1px solid var(--container-border);
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 16px;
        }

        .username-edit {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .edit-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
        }

        .participant-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }
        .participant-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-primary);
        }

        #media-view-modal .modal-content {
            background: transparent;
            backdrop-filter: none;
            box-shadow: none;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }
        #media-view-modal img, #media-view-modal video {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 16px;
        }
        #media-view-modal .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 30px;
            width: 44px;
            height: 44px;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Экран входа -->
        <div class="screen" id="auth-screen">
            <div class="page-header">
                <h2>ChatX</h2>
                <div></div>
            </div>
            <div class="auth-container">
                <div class="panel">
                    <div class="input-group">
                        <input type="text" id="auth-username" placeholder="Имя пользователя">
                    </div>
                    <div class="input-group">
                        <input type="password" id="auth-password" placeholder="Пароль">
                    </div>
                    <div class="flex-col">
                        <button class="btn btn-primary" id="auth-login">Войти</button>
                        <button class="btn" id="auth-register">Зарегистрироваться</button>
                    </div>
                    <div id="auth-status" class="status"></div>
                </div>
            </div>
        </div>

        <!-- Главное приложение -->
        <div class="screen screen-hidden" id="main-screen">
            <div class="screen-container">
                <!-- Профиль -->
                <div class="inner-screen" id="profile-screen">
                    <div class="page-header">
                        <h2>Профиль</h2>
                        <div class="theme-toggle" id="profile-theme-toggle">
                            <i class="fas fa-sun"></i>
                        </div>
                    </div>
                    <div class="page-content">
                        <div class="panel">
                            <div style="margin-bottom: 20px;">
                                <div style="color: var(--text-primary); font-size: 18px; margin-bottom: 8px;">Имя пользователя</div>
                                <div class="username-edit">
                                    <span style="color: var(--accent); font-size: 24px; font-weight: 600;" id="profile-username"></span>
                                    <button class="edit-btn" id="edit-username-btn"><i class="fas fa-pencil-alt"></i></button>
                                </div>
                            </div>
                            <button class="btn" id="change-password-btn" style="margin-bottom: 8px;">Изменить пароль</button>
                            <div style="margin: 16px 0;">
                                <div class="flex-row" style="justify-content: space-between;">
                                    <span style="color: var(--text-primary);">Требовать пароль для комнат</span>
                                    <label class="switch">
                                        <input type="checkbox" id="require-password-toggle">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                                <div id="password-timeout-container" style="margin-top: 12px; display: none;">
                                    <select id="password-timeout" class="btn" style="width:100%;">
                                        <option value="0">Выкл (сразу)</option>
                                        <option value="60">1 минута</option>
                                        <option value="300">5 минут</option>
                                        <option value="900">15 минут</option>
                                        <option value="3600">1 час</option>
                                        <option value="7200">2 часа</option>
                                        <option value="21600">6 часов</option>
                                        <option value="86400">24 часа</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div style="flex:1;"></div>
                        <button class="btn" id="logout-btn" style="margin-bottom: 8px;">Выйти</button>
                        <button class="btn" id="delete-account-btn" style="background: #ff6b6b; color: white;">Удалить аккаунт</button>
                    </div>
                </div>

                <!-- Публичный чат -->
                <div class="inner-screen inner-screen-hidden" id="public-screen">
                    <div class="chat-header">
                        <div class="chat-header-left">
                            <div class="back-btn" id="public-back">
                                <i class="fas fa-arrow-left"></i>
                            </div>
                            <h2>Публичный чат</h2>
                        </div>
                        <div class="participant-count" id="public-participant-count" title="Участники онлайн">0</div>
                    </div>
                    <div class="chat-messages" id="public-messages"></div>
                    <div class="chat-input-area" id="public-input-area">
                        <textarea id="public-input" rows="1" placeholder="Написать..."></textarea>
                        <button class="btn attach-btn" id="public-attach"><i class="fas fa-paperclip"></i></button>
                        <button class="btn btn-primary" id="public-send"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

                <!-- Личные комнаты (список) -->
                <div class="inner-screen inner-screen-hidden" id="private-screen">
                    <div class="page-header">
                        <h2>Личные комнаты</h2>
                        <div class="participant-count" id="private-room-count">0</div>
                    </div>
                    <div class="page-content">
                        <button class="btn btn-primary" id="create-room-btn" style="margin-bottom: 16px;">Войти / Создать</button>
                        <div id="private-room-list" class="room-list"></div>
                    </div>
                </div>

                <!-- Личный чат (серверный) -->
