meta:
  environment: node
  toolchain:
    name: npm
    version: 18

build:
  # Команда для установки зависимостей
  # npm install выполняется автоматически
  # Дополнительные команды не требуются
  artifacts:
    # Копируем все файлы в корень приложения
    "*": /

run:
  # Точка входа - ваш серверный файл
  scriptName: server.js
  # Порт, который слушает ваше приложение (в server.js у вас 3000)
  containerPort: 3000
  # Постоянное хранилище для файлов (аватары, локальное хранилище)
  persistenceMount: /data
