                    <div class="chat-input-area" id="private-chat-input-area">
                        <textarea id="private-chat-input" rows="1" placeholder="Написать..."></textarea>
                        <button class="btn attach-btn" id="private-chat-attach"><i class="fas fa-paperclip"></i></button>
                        <button class="btn btn-primary" id="private-chat-send"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

                <!-- Локальное хранилище -->
                <div class="inner-screen inner-screen-hidden" id="local-chat-screen">
                    <div class="chat-header">
                        <div class="chat-header-left">
                            <div class="back-btn" id="local-chat-back">
                                <i class="fas fa-arrow-left"></i>
                            </div>
                            <h2>Хранилище</h2>
                        </div>
                        <div class="participant-count" title="Вы">1</div>
                    </div>
                    <div class="chat-messages" id="local-chat-messages"></div>
                    <div class="chat-input-area" id="local-chat-input-area">
                        <textarea id="local-chat-input" rows="1" placeholder="Заметка..."></textarea>
                        <button class="btn attach-btn" id="local-chat-attach"><i class="fas fa-paperclip"></i></button>
                        <button class="btn btn-primary" id="local-chat-send"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <!-- Нижняя навигация -->
            <div class="bottom-nav" id="bottom-nav">
                <div class="nav-item" data-screen="profile">
                    <i class="fas fa-user"></i>
                    <span>Профиль</span>
                </div>
                <div class="nav-item" data-screen="public">
                    <i class="fas fa-globe"></i>
                    <span>Публичный</span>
                </div>
                <div class="nav-item" data-screen="private">
                    <i class="fas fa-lock"></i>
                    <span>Личные</span>
                </div>
            </div>
        </div>

        <!-- Модальное окно ввода пароля -->
        <div id="password-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3 style="color: var(--text-primary); margin-bottom: 16px;" id="modal-title">Введите пароль</h3>
                <input type="password" id="modal-password" placeholder="Пароль" style="width:100%; padding:12px; border-radius:30px; border:1px solid var(--card-border); background:var(--input-bg); color:var(--text-primary);">
                <div id="modal-error" style="color:#ff6b6b; margin-top:8px; font-size:14px;"></div>
                <div class="modal-buttons">
                    <button class="btn" id="modal-cancel">Отмена</button>
                    <button class="btn btn-primary" id="modal-confirm">Подтвердить</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно подтверждения -->
        <div id="confirm-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3 style="color: var(--text-primary); margin-bottom: 16px;" id="confirm-title">Вы уверены?</h3>
                <div class="modal-buttons">
                    <button class="btn" id="confirm-no">Нет</button>
                    <button class="btn btn-primary" id="confirm-yes">Да</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно смены пароля -->
        <div id="change-password-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3 style="color: var(--text-primary); margin-bottom: 16px;">Смена пароля</h3>
                <input type="password" id="old-password" placeholder="Старый пароль" style="width:100%; padding:12px; border-radius:30px; border:1px solid var(--card-border); background:var(--input-bg); color:var(--text-primary); margin-bottom:12px;">
                <input type="password" id="new-password" placeholder="Новый пароль" style="width:100%; padding:12px; border-radius:30px; border:1px solid var(--card-border); background:var(--input-bg); color:var(--text-primary); margin-bottom:12px;">
                <div id="change-password-error" style="color:#ff6b6b; margin-top:8px; font-size:14px;"></div>
                <div class="modal-buttons">
                    <button class="btn" id="change-password-cancel">Отмена</button>
                    <button class="btn btn-primary" id="change-password-confirm">Сменить</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно редактирования названия комнаты -->
        <div id="rename-room-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3 style="color: var(--text-primary); margin-bottom: 16px;" id="rename-modal-title">Изменить название комнаты</h3>
                <input type="text" id="rename-room-input" placeholder="Новое название" style="width:100%; padding:12px; border-radius:30px; border:1px solid var(--card-border); background:var(--input-bg); color:var(--text-primary);">
                <div id="rename-room-error" style="color:#ff6b6b; margin-top:8px; font-size:14px;"></div>
                <div class="modal-buttons">
                    <button class="btn" id="rename-room-cancel">Отмена</button>
                    <button class="btn btn-primary" id="rename-room-confirm">Сохранить</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно информации о комнате -->
        <div id="room-info-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3 style="color: var(--text-primary); margin-bottom: 16px;">Информация о комнате</h3>
                <div style="color: var(--text-primary); margin-bottom: 8px;"><strong>Название:</strong> <span id="room-info-name"></span></div>
                <div style="color: var(--text-primary); margin-bottom: 8px;"><strong>ID:</strong> <span id="room-info-id"></span></div>
                <div style="color: var(--text-primary); margin-bottom: 8px;"><strong>Пароль:</strong> <span id="room-info-password"></span></div>
                <div class="modal-buttons">
                    <button class="btn" id="room-info-close">Закрыть</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно списка участников -->
        <div id="participants-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3 style="color: var(--text-primary); margin-bottom: 16px;">Участники онлайн</h3>
                <ul id="participants-list" class="participant-list"></ul>
                <div class="modal-buttons">
                    <button class="btn" id="participants-close">Закрыть</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно просмотра медиа -->
        <div id="media-view-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <button class="close-btn" id="media-view-close"><i class="fas fa-times"></i></button>
                <div id="media-view-container"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const API_BASE = 'https://chatx-server-pyyi.onrender.com';
            let currentUser = null;
            let currentRoom = null;
            let socket = null;
            let currentPrivateRoom = null;
            let isLocalRoom = false;
            let unreadCounts = {};
            let localMessages = [];
            let roomMessagesCache = {};

            let userSettings = {
                requirePassword: false,
                passwordTimeout: 0
            };

            // Тема
            let currentTheme = localStorage.getItem('chatxTheme') || 'system';
            function applyTheme() {
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                let isDark = false;
                if (currentTheme === 'dark') isDark = true;
                else if (currentTheme === 'system') isDark = systemDark;
                document.body.classList.toggle('dark', isDark);
                const icon = document.querySelector('#profile-theme-toggle i');
                if (icon) {
                    icon.className = currentTheme === 'light' ? 'fas fa-sun' : (currentTheme === 'dark' ? 'fas fa-moon' : 'fas fa-circle-half-stroke');
                }
                const themeColorMeta = document.getElementById('theme-color-meta');
                if (themeColorMeta) {
                    themeColorMeta.setAttribute('content', isDark ? '#1a1a2e' : '#4a3aff');
                }
            }
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
            applyTheme();

            // Элементы (полный список)
            const authScreen = document.getElementById('auth-screen');
            const mainScreen = document.getElementById('main-screen');
            const profileScreen = document.getElementById('profile-screen');
            const publicScreen = document.getElementById('public-screen');
            const privateScreen = document.getElementById('private-screen');
            const privateChatScreen = document.getElementById('private-chat-screen');
            const localChatScreen = document.getElementById('local-chat-screen');
            const navItems = document.querySelectorAll('.nav-item');
            const bottomNav = document.getElementById('bottom-nav');
            const profileUsername = document.getElementById('profile-username');
            const authUsername = document.getElementById('auth-username');
            const authPassword = document.getElementById('auth-password');
            const authStatus = document.getElementById('auth-status');
            const authLogin = document.getElementById('auth-login');
            const authRegister = document.getElementById('auth-register');
            const editUsernameBtn = document.getElementById('edit-username-btn');
            const publicMessages = document.getElementById('public-messages');
            const publicInput = document.getElementById('public-input');
            const publicSend = document.getElementById('public-send');
            const publicAttach = document.getElementById('public-attach');
            const publicParticipantCount = document.getElementById('public-participant-count');
            const publicBack = document.getElementById('public-back');
            const privateRoomList = document.getElementById('private-room-list');
            const privateRoomCount = document.getElementById('private-room-count');
            const createRoomBtn = document.getElementById('create-room-btn');
            const privateChatMessages = document.getElementById('private-chat-messages');
            const privateChatInput = document.getElementById('private-chat-input');
            const privateChatSend = document.getElementById('private-chat-send');
            const privateChatAttach = document.getElementById('private-chat-attach');
            const privateChatParticipantCount = document.getElementById('private-chat-participant-count');
            const privateChatBack = document.getElementById('private-chat-back');
            const privateChatTitle = document.getElementById('private-chat-title');
            const privateChatInfoBtn = document.getElementById('private-chat-info-btn');
            const privateChatRenameBtn = document.getElementById('private-chat-rename-btn');
            const localChatMessages = document.getElementById('local-chat-messages');
            const localChatInput = document.getElementById('local-chat-input');
            const localChatSend = document.getElementById('local-chat-send');
            const localChatAttach = document.getElementById('local-chat-attach');
            const localChatBack = document.getElementById('local-chat-back');
            
            // Модалки
            const passwordModal = document.getElementById('password-modal');
            const confirmModal = document.getElementById('confirm-modal');
            const changePasswordModal = document.getElementById('change-password-modal');
            const renameRoomModal = document.getElementById('rename-room-modal');
            const roomInfoModal = document.getElementById('room-info-modal');
            const participantsModal = document.getElementById('participants-modal');
            const mediaViewModal = document.getElementById('media-view-modal');
            const mediaViewContainer = document.getElementById('media-view-container');
            const mediaViewClose = document.getElementById('media-view-close');
            
            // Элементы внутри модалок
            const modalTitle = document.getElementById('modal-title');
            const modalPassword = document.getElementById('modal-password');
            const modalError = document.getElementById('modal-error');
            const modalCancel = document.getElementById('modal-cancel');
            const modalConfirm = document.getElementById('modal-confirm');
            const confirmNo = document.getElementById('confirm-no');
            const confirmYes = document.getElementById('confirm-yes');
            const oldPassword = document.getElementById('old-password');
            const newPassword = document.getElementById('new-password');
            const changePasswordError = document.getElementById('change-password-error');
            const changePasswordCancel = document.getElementById('change-password-cancel');
            const changePasswordConfirm = document.getElementById('change-password-confirm');
            const renameRoomInput = document.getElementById('rename-room-input');
            const renameRoomError = document.getElementById('rename-room-error');
            const renameRoomCancel = document.getElementById('rename-room-cancel');
            const renameRoomConfirm = document.getElementById('rename-room-confirm');
            const roomInfoName = document.getElementById('room-info-name');
            const roomInfoId = document.getElementById('room-info-id');
            const roomInfoPassword = document.getElementById('room-info-password');
            const roomInfoClose = document.getElementById('room-info-close');
            const participantsList = document.getElementById('participants-list');
            const participantsClose = document.getElementById('participants-close');

            // Переключатели в профиле
            const requirePasswordToggle = document.getElementById('require-password-toggle');
            const passwordTimeoutContainer = document.getElementById('password-timeout-container');
            const passwordTimeoutSelect = document.getElementById('password-timeout');
            const profileThemeToggle = document.getElementById('profile-theme-toggle');

            profileThemeToggle.addEventListener('click', () => {
                if (currentTheme === 'light') currentTheme = 'dark';
                else if (currentTheme === 'dark') currentTheme = 'system';
                else currentTheme = 'light';
                localStorage.setItem('chatxTheme', currentTheme);
                applyTheme();
            });

            // Навигация
            function showInnerScreen(screenId) {
                profileScreen.classList.add('inner-screen-hidden');
                publicScreen.classList.add('inner-screen-hidden');
                privateScreen.classList.add('inner-screen-hidden');
                privateChatScreen.classList.add('inner-screen-hidden');
                localChatScreen.classList.add('inner-screen-hidden');
                document.getElementById(screenId).classList.remove('inner-screen-hidden');

                let targetNav = null;
                if (screenId === 'profile-screen') targetNav = 'profile';
                else if (screenId === 'public-screen') targetNav = 'public';
                else if (screenId === 'private-screen' || screenId === 'private-chat-screen' || screenId === 'local-chat-screen') targetNav = 'private';
                navItems.forEach(item => {
                    const screen = item.dataset.screen;
                    if (screen === targetNav) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });

                if (screenId === 'public-screen' || screenId === 'private-chat-screen' || screenId === 'local-chat-screen') {
                    bottomNav.style.display = 'none';
                } else {
                    bottomNav.style.display = 'flex';
                }

                if (screenId === 'private-screen') {
                    loadPrivateRooms();
                }
            }

            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    const screen = item.dataset.screen;
                    if (screen === 'public') {
                        if (currentRoom) leaveRoom(currentRoom);
                        isLocalRoom = false;
                        joinRoom('public');
                        showInnerScreen('public-screen');
                    } else if (screen === 'private') {
                        showInnerScreen('private-screen');
                    } else {
                        showInnerScreen('profile-screen');
                    }
                });
            });

            // Загрузка настроек пользователя
            async function loadUserSettings() {
                if (!currentUser) return;
                try {
                    const res = await fetch(API_BASE + '/api/user-settings?username=' + currentUser.username);
                    const data = await res.json();
                    userSettings = data;
                    requirePasswordToggle.checked = userSettings.requirePassword;
                    passwordTimeoutContainer.style.display = userSettings.requirePassword ? 'block' : 'none';
                    passwordTimeoutSelect.value = userSettings.passwordTimeout || 0;
                } catch (err) {
                    console.error('Ошибка загрузки настроек', err);
                }
            }

            async function saveUserSettings() {
                if (!currentUser) return;
                try {
                    await fetch(API_BASE + '/api/user-settings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: currentUser.username, settings: userSettings })
                    });
                } catch (err) {
                    console.error('Ошибка сохранения настроек', err);
                }
            }

            requirePasswordToggle.addEventListener('change', () => {
                userSettings.requirePassword = requirePasswordToggle.checked;
                passwordTimeoutContainer.style.display = userSettings.requirePassword ? 'block' : 'none';
                saveUserSettings();
            });

            passwordTimeoutSelect.addEventListener('change', () => {
                userSettings.passwordTimeout = parseInt(passwordTimeoutSelect.value);
                saveUserSettings();
            });

            // Смена имени
            editUsernameBtn.addEventListener('click', async () => {
                const newName = prompt('Введите новое имя пользователя:');
                if (!newName) return;
                const password = prompt('Введите ваш пароль для подтверждения:');
                if (!password) return;
                try {
                    const res = await fetch(API_BASE + '/api/change-username', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ oldUsername: currentUser.username, newUsername: newName, password })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Ошибка смены имени');
                    currentUser.username = newName;
                    localStorage.setItem('chatxUser', JSON.stringify(currentUser));
                    profileUsername.textContent = newName;
                    if (socket) {
                        socket.close();
                        connectSocket();
                    }
                    alert('Имя успешно изменено');
                } catch (err) {
                    alert(err.message);
                }
            });

            // Смена пароля
            document.getElementById('change-password-btn').addEventListener('click', () => {
                changePasswordModal.style.display = 'flex';
                oldPassword.value = '';
                newPassword.value = '';
                changePasswordError.textContent = '';
            });

            changePasswordCancel.addEventListener('click', () => {
                changePasswordModal.style.display = 'none';
            });

            changePasswordConfirm.addEventListener('click', async () => {
                const old = oldPassword.value.trim();
                const newPwd = newPassword.value.trim();
                if (!old || !newPwd) {
                    changePasswordError.textContent = 'Заполните оба поля';
                    return;
                }
                try {
                    const res = await fetch(API_BASE + '/api/change-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: currentUser.username, oldPassword: old, newPassword: newPwd })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Ошибка');
                    changePasswordModal.style.display = 'none';
                    alert('Пароль успешно изменён');
                } catch (err) {
                    changePasswordError.textContent = err.message;
                }
            });

            // Авторизация
            async function login(username, password) {
                try {
                    const res = await fetch(API_BASE + '/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Ошибка');
                    currentUser = { username };
                    localStorage.setItem('chatxUser', JSON.stringify(currentUser));
                    authScreen.classList.add('screen-hidden');
                    mainScreen.classList.remove('screen-hidden');
                    profileUsername.textContent = username;
                    connectSocket();
                    loadUserSettings();
                    loadPrivateRooms();
                    showInnerScreen('profile-screen');
                } catch (err) {
                    authStatus.textContent = err.message;
                }
            }

            async function register(username, password) {
                try {
                    const res = await fetch(API_BASE + '/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Ошибка');
                    authStatus.textContent = 'Регистрация успешна, выполняем вход...';
                    await login(username, password);
                } catch (err) {
                    authStatus.textContent = err.message;
                }
            }

            authLogin.addEventListener('click', () => {
                const u = authUsername.value.trim();
                const p = authPassword.value.trim();
                if (u && p) login(u, p);
                else authStatus.textContent = 'Введите имя и пароль';
            });

            authRegister.addEventListener('click', () => {
                const u = authUsername.value.trim();
                const p = authPassword.value.trim();
                if (u && p) register(u, p);
                else authStatus.textContent = 'Введите имя и пароль';
            });

            const savedUser = localStorage.getItem('chatxUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                authScreen.classList.add('screen-hidden');
                mainScreen.classList.remove('screen-hidden');
                profileUsername.textContent = currentUser.username;
                connectSocket();
                loadUserSettings();
                loadPrivateRooms();
                showInnerScreen('profile-screen');
            } else {
                authScreen.classList.remove('screen-hidden');
                mainScreen.classList.add('screen-hidden');
            }

            // ---------- Загрузка локального хранилища ----------
            function loadLocalMessages() {
                try {
                    const saved = localStorage.getItem('chatx_local_room');
                    if (saved) localMessages = JSON.parse(saved);
                    else localMessages = [];
                } catch (e) {
                    localMessages = [];
                }
            }
            function saveLocalMessages() {
                localStorage.setItem('chatx_local_room', JSON.stringify(localMessages));
            }
            loadLocalMessages();

            // ---------- Кеш сообщений для серверных комнат ----------
            function loadRoomCache(roomId) {
                try {
                    const saved = localStorage.getItem(`chatx_room_${roomId}`);
                    if (saved) roomMessagesCache[roomId] = JSON.parse(saved);
                    else roomMessagesCache[roomId] = [];
                } catch (e) {
                    roomMessagesCache[roomId] = [];
                }
            }
            function saveRoomCache(roomId) {
                if (roomMessagesCache[roomId]) {
                    localStorage.setItem(`chatx_room_${roomId}`, JSON.stringify(roomMessagesCache[roomId]));
                }
            }
            function addMessageToCache(roomId, msg) {
                if (!roomMessagesCache[roomId]) {
                    roomMessagesCache[roomId] = [];
                }
                if (!roomMessagesCache[roomId].some(m => m.id === msg.id)) {
                    roomMessagesCache[roomId].push(msg);
                    saveRoomCache(roomId);
                }
            }

            // ---------- Socket ----------
            function connectSocket() {
                if (socket) socket.close();
                socket = io(API_BASE, { reconnectionAttempts: 5, timeout: 10000 });
                socket.on('connect', () => console.log('✅ Socket connected'));
                socket.on('roomError', (data) => alert(data.message));
                socket.on('roomJoined', (data) => {
                    console.log('✅ roomJoined', data.roomId, data.messages.length);
                    roomMessagesCache[data.roomId] = data.messages;
                    saveRoomCache(data.roomId);
                    if (data.roomId === currentRoom && !isLocalRoom) {
                        displayMessages(data.roomId, data.messages);
                        if (data.roomId === 'public') {
                            publicParticipantCount.textContent = data.userCount;
                        } else if (data.roomId === currentPrivateRoom?.id) {
                            privateChatParticipantCount.textContent = data.userCount;
                        }
                    }
                });
                socket.on('newMessage', (data) => {
                    console.log('📩 newMessage for room', data.roomId);
                    addMessageToCache(data.roomId, data);
                    if (data.roomId === currentRoom && !isLocalRoom) {
                        addMessageToChat(data);
                    } else if (data.roomId !== 'public') {
                        if (!unreadCounts[data.roomId]) unreadCounts[data.roomId] = 0;
                        unreadCounts[data.roomId]++;
                        saveUnread();
                        loadPrivateRooms();
                    }
                });
                socket.on('userCount', (data) => {
                    if (currentRoom === 'public') publicParticipantCount.textContent = data.count;
                    else if (currentRoom === currentPrivateRoom?.id) privateChatParticipantCount.textContent = data.count;
                });
            }

            function joinRoom(roomId, roomName = null) {
                if (!socket && roomId !== '_localstorage') return;
                if (roomId === '_localstorage') {
                    isLocalRoom = true;
                    currentRoom = '_localstorage';
                    currentPrivateRoom = null;
                    displayLocalMessages();
                    showInnerScreen('local-chat-screen');
                    return;
                }
                isLocalRoom = false;
                socket.emit('joinRoom', { roomId, username: currentUser.username });
                currentRoom = roomId;
                if (roomId === 'public') return;
                currentPrivateRoom = { id: roomId, name: roomName || roomId };
                privateChatTitle.textContent = roomName || roomId;
                if (unreadCounts[roomId]) {
                    delete unreadCounts[roomId];
                    saveUnread();
                }
                if (roomMessagesCache[roomId]) {
                    displayMessages(roomId, roomMessagesCache[roomId]);
                } else {
                    privateChatMessages.innerHTML = '';
                }
            }

            function leaveRoom(roomId) {
                if (socket && roomId && roomId !== '_localstorage') socket.emit('leaveRoom', { roomId });
                if (currentRoom === roomId) {
                    currentRoom = null;
                    if (roomId !== 'public' && roomId !== '_localstorage') currentPrivateRoom = null;
                }
            }

            function sendMessage(roomId, text, isMedia = false) {
                if (roomId === '_localstorage') {
                    const msg = {
                        id: 'local_' + Date.now() + Math.random(),
                        roomId: '_localstorage',
                        sender: currentUser?.username || 'local',
                        text: text,
                        timestamp: new Date().toISOString(),
                        isMedia: isMedia
                    };
                    localMessages.push(msg);
                    saveLocalMessages();
                    addLocalMessageToChat(msg);
                    return;
                }
                if (!socket || !currentUser) return;
                socket.emit('sendMessage', { roomId, sender: currentUser.username, text });
            }

            // Отображение сообщений
            function renderMessageBubble(msg, own) {
                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const isMedia = msg.text && (msg.text.startsWith('data:image') || msg.text.startsWith('data:video') || msg.text.startsWith('data:audio'));
                let contentHtml = '';
                if (isMedia) {
                    if (msg.text.startsWith('data:image')) {
                        contentHtml = `<img src="${msg.text}" class="message-media" onclick="openMedia('${msg.text}')">`;
                    } else if (msg.text.startsWith('data:video')) {
                        contentHtml = `<video controls class="message-media" src="${msg.text}"></video>`;
                    } else if (msg.text.startsWith('data:audio')) {
                        contentHtml = `<audio controls src="${msg.text}"></audio>`;
                    }
                    contentHtml += `<button class="message-download-btn" onclick="downloadMedia('${msg.text}')"><i class="fas fa-download"></i></button>`;
                } else {
                    contentHtml = `<div class="message-text">${escapeHtml(msg.text)}</div>`;
                }
                return `
                    <div class="message-bubble ${own ? 'message-bubble-own' : ''}">
                        ${own ? '' : `<div class="message-sender">${escapeHtml(msg.sender)}</div>`}
                        ${contentHtml}
                        <div class="message-time">${time}</div>
                    </div>
                `;
            }

            function addMessageToChat(msg) {
                const container = msg.roomId === 'public' ? publicMessages : (msg.roomId === currentPrivateRoom?.id ? privateChatMessages : null);
                if (!container) return;
                if (container.querySelector(`[data-msg-id="${msg.id}"]`)) return;
                const own = msg.sender === currentUser.username;
                const div = document.createElement('div');
                div.className = `message ${own ? 'message-own' : ''}`;
                div.setAttribute('data-msg-id', msg.id);
                div.innerHTML = renderMessageBubble(msg, own);
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            function displayMessages(roomId, messages) {
                const container = roomId === 'public' ? publicMessages : (roomId === currentPrivateRoom?.id ? privateChatMessages : null);
                if (!container) return;
                container.innerHTML = '';
                messages.forEach(msg => {
                    const own = msg.sender === currentUser.username;
                    const div = document.createElement('div');
                    div.className = `message ${own ? 'message-own' : ''}`;
                    div.setAttribute('data-msg-id', msg.id);
                    div.innerHTML = renderMessageBubble(msg, own);
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            }

            function addLocalMessageToChat(msg) {
                const container = localChatMessages;
                if (!container) return;
                if (container.querySelector(`[data-msg-id="${msg.id}"]`)) return;
                const own = true;
                const div = document.createElement('div');
                div.className = `message message-own`;
                div.setAttribute('data-msg-id', msg.id);
                div.innerHTML = renderMessageBubble(msg, own);
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            function displayLocalMessages() {
                localChatMessages.innerHTML = '';
                localMessages.forEach(msg => {
                    addLocalMessageToChat(msg);
                });
            }

            window.openMedia = function(src) {
                mediaViewContainer.innerHTML = src.startsWith('data:video') ? 
                    `<video controls src="${src}"></video>` : 
                    `<img src="${src}">`;
                mediaViewModal.style.display = 'flex';
            };
            window.downloadMedia = function(src) {
                const a = document.createElement('a');
                a.href = src;
                a.download = 'media_' + Date.now();
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            mediaViewClose.addEventListener('click', () => {
                mediaViewModal.style.display = 'none';
                mediaViewContainer.innerHTML = '';
            });

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, m => {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // Непрочитанные
            function loadUnreadFromStorage() {
                try {
                    const saved = localStorage.getItem('chatxUnread');
                    if (saved) unreadCounts = JSON.parse(saved);
                } catch (e) {}
            }
            function saveUnread() {
                localStorage.setItem('chatxUnread', JSON.stringify(unreadCounts));
            }
            loadUnreadFromStorage();

            // Публичный чат
            publicBack.addEventListener('click', () => {
                leaveRoom('public');
                showInnerScreen('profile-screen');
            });

            function attachMediaHandler(roomId) {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*,video/*,audio/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const dataUrl = event.target.result;
                        sendMessage(roomId, dataUrl, true);
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
            }

            publicAttach.addEventListener('click', () => attachMediaHandler('public'));
            publicSend.addEventListener('click', () => {
                const text = publicInput.value.trim();
                if (text && currentRoom === 'public') {
                    sendMessage('public', text);
                    publicInput.value = '';
                }
            });
            publicInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    publicSend.click();
                }
            });

            publicParticipantCount.addEventListener('click', async () => {
                try {
                    const res = await fetch(API_BASE + '/api/rooms/participants/public');
                    const data = await res.json();
                    participantsList.innerHTML = data.map(u => `<li>${escapeHtml(u)}</li>`).join('');
                    participantsModal.style.display = 'flex';
                } catch (err) {
                    alert('Не удалось загрузить список участников');
                }
            });

            // Личные комнаты (список)
            async function loadPrivateRooms() {
                if (!currentUser) return;
                try {
                    const res = await fetch(API_BASE + '/api/rooms/list/' + currentUser.username);
                    let rooms = await res.json();
                    
                    const localRoom = {
                        id: '_localstorage',
                        name: 'Хранилище',
                        type: 'local',
                        local: true
                    };
                    
                    rooms.sort((a, b) => {
                        const aUnread = unreadCounts[a.id] ? 1 : 0;
                        const bUnread = unreadCounts[b.id] ? 1 : 0;
                        return bUnread - aUnread;
                    });
                    
                    const allRooms = [localRoom, ...rooms];
                    
                    privateRoomList.innerHTML = allRooms.map(r => {
                        const hasUnread = unreadCounts[r.id] > 0;
                        const isLocal = r.id === '_localstorage';
                        return `
                        <div class="room-item" data-roomid="${r.id}" data-roomname="${r.name}" data-local="${isLocal}">
                            <div class="room-info">
                                <span class="room-name">${escapeHtml(r.name)}</span>
                                ${hasUnread ? '<span class="room-unread-dot"></span>' : ''}
                            </div>
                            <div class="room-actions">
                                ${!isLocal ? `
                                    <button class="room-edit-btn" data-roomid="${r.id}" data-roomname="${r.name}"><i class="fas fa-pencil-alt"></i></button>
                                    <button class="room-delete-btn" data-roomid="${r.id}"><i class="fas fa-times"></i></button>
                                ` : '<span style="color:var(--text-muted);">локально</span>'}
                            </div>
                        </div>
                    `}).join('');
                    
                    privateRoomCount.textContent = rooms.length;

                    document.querySelectorAll('.room-item').forEach(el => {
                        el.addEventListener('click', (e) => {
                            if (e.target.closest('.room-edit-btn') || e.target.closest('.room-delete-btn')) return;
                            const rid = el.dataset.roomid;
                            const rname = el.dataset.roomname;
                            const isLocal = el.dataset.local === 'true';
                            
                            if (isLocal) {
                                if (currentRoom) leaveRoom(currentRoom);
                                joinRoom('_localstorage');
                                return;
                            }
                            
                            if (userSettings.requirePassword) {
                                const lastEntry = localStorage.getItem('lastEntry_' + rid);
                                const now = Date.now();
                                if (lastEntry && (now - parseInt(lastEntry)) < userSettings.passwordTimeout * 1000) {
                                    performRoomEntry(rid, rname);
                                } else {
                                    promptPasswordForRoom(rid, rname, true);
                                }
                            } else {
                                performRoomEntry(rid, rname);
                            }
                        });
                    });

                    document.querySelectorAll('.room-edit-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const rid = btn.dataset.roomid;
                            const oldName = btn.dataset.roomname;
                            renameRoomInput.value = oldName;
                            renameRoomModal.style.display = 'flex';
                            renameRoomConfirm.onclick = async () => {
                                const newName = renameRoomInput.value.trim();
                                if (!newName) {
                                    renameRoomError.textContent = 'Введите название';
                                    return;
                                }
                                try {
                                    const res = await fetch(API_BASE + '/api/rooms/rename', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ roomId: rid, username: currentUser.username, newName })
                                    });
                                    const data = await res.json();
                                    if (!res.ok) throw new Error(data.error || 'Ошибка');
                                    renameRoomModal.style.display = 'none';
                                    loadPrivateRooms();
                                } catch (err) {
                                    renameRoomError.textContent = err.message;
                                }
                            };
                        });
                    });

                    document.querySelectorAll('.room-delete-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const rid = btn.dataset.roomid;
                            confirmModal.style.display = 'flex';
                            document.getElementById('confirm-title').textContent = 'Удалить комнату?';
                            confirmYes.onclick = async () => {
                                confirmModal.style.display = 'none';
                                try {
                                    await fetch(API_BASE + '/api/rooms/delete', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ roomId: rid, username: currentUser.username })
                                    });
                                    loadPrivateRooms();
                                } catch (err) {
                                    alert('Ошибка удаления');
                                }
                            };
                            confirmNo.onclick = () => {
                                confirmModal.style.display = 'none';
                            };
                        });
                    });

                } catch (err) {
                    console.error(err);
                }
            }

            function performRoomEntry(roomId, roomName) {
                if (currentRoom) leaveRoom(currentRoom);
                joinRoom(roomId, roomName);
                showInnerScreen('private-chat-screen');
                localStorage.setItem('lastEntry_' + roomId, Date.now().toString());
            }

            function promptPasswordForRoom(roomId, roomName, shouldJoin = true) {
                modalTitle.textContent = 'Введите пароль комнаты';
                modalPassword.value = '';
                modalError.textContent = '';
                passwordModal.style.display = 'flex';
                const onConfirm = async () => {
                    const pwd = modalPassword.value.trim();
                    if (!pwd) return;
                    try {
                        const check = await fetch(API_BASE + '/api/rooms/check-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, password: pwd }) });
                        if (check.ok) {
                            await fetch(API_BASE + '/api/rooms/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, username: currentUser.username }) });
                            passwordModal.style.display = 'none';
                            if (shouldJoin) {
                                performRoomEntry(roomId, roomName);
                            }
                        } else if (check.status === 404) {
                            const newName = prompt('Введите название новой комнаты:', roomName);
                            if (!newName) return;
                            const createRes = await fetch(API_BASE + '/api/rooms/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, roomName: newName, password: pwd, creator: currentUser.username }) });
                            if (!createRes.ok) {
                                const err = await createRes.json();
                                modalError.textContent = err.error || 'Ошибка создания';
                                return;
                            }
                            passwordModal.style.display = 'none';
                            if (shouldJoin) {
                                performRoomEntry(roomId, newName);
                            }
                        } else {
                            const err = await check.json();
                            modalError.textContent = err.error || 'Неверный пароль';
                        }
                    } catch (err) {
                        modalError.textContent = 'Ошибка сервера';
                    }
                };
                modalConfirm.onclick = onConfirm;
                modalCancel.onclick = () => {
                    passwordModal.style.display = 'none';
                };
            }

            createRoomBtn.addEventListener('click', async () => {
                const roomId = prompt('Введите ID комнаты (латиница, цифры, дефис, _)');
                if (!roomId) return;
                const roomName = prompt('Введите название комнаты');
                if (!roomName) return;
                const password = prompt('Введите пароль для комнаты');
                if (!password) return;
                try {
                    const check = await fetch(API_BASE + '/api/rooms/check-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, password }) });
                    if (check.ok) {
                        await fetch(API_BASE + '/api/rooms/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, username: currentUser.username }) });
                        performRoomEntry(roomId, roomName);
                    } else if (check.status === 404) {
                        const res = await fetch(API_BASE + '/api/rooms/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, roomName, password, creator: currentUser.username }) });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error);
                        performRoomEntry(roomId, roomName);
                    } else {
                        const err = await check.json();
                        alert(err.error || 'Ошибка');
                    }
                } catch (err) {
                    alert(err.message);
                }
            });

            // Личный чат
            privateChatBack.addEventListener('click', () => {
                if (currentPrivateRoom) leaveRoom(currentPrivateRoom.id);
                showInnerScreen('private-screen');
            });

            privateChatAttach.addEventListener('click', () => {
                if (currentRoom && currentRoom !== 'public' && currentRoom !== '_localstorage') {
                    attachMediaHandler(currentRoom);
                }
            });

            privateChatSend.addEventListener('click', () => {
                const text = privateChatInput.value.trim();
                if (text && currentRoom && currentRoom !== 'public' && currentRoom !== '_localstorage') {
                    sendMessage(currentRoom, text);
                    privateChatInput.value = '';
                }
            });

            privateChatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    privateChatSend.click();
                }
            });

            privateChatInfoBtn.addEventListener('click', async () => {
                if (!currentPrivateRoom) return;
                try {
                    const res = await fetch(API_BASE + '/api/rooms/info/' + currentPrivateRoom.id);
                    const data = await res.json();
                    roomInfoName.textContent = data.name;
                    roomInfoId.textContent = data.id;
                    roomInfoPassword.textContent = data.password;
                    roomInfoModal.style.display = 'flex';
                } catch (err) {
                    alert('Не удалось загрузить информацию о комнате');
                }
            });

            roomInfoClose.addEventListener('click', () => {
                roomInfoModal.style.display = 'none';
            });

            privateChatRenameBtn.addEventListener('click', () => {
                if (!currentPrivateRoom) return;
                renameRoomInput.value = currentPrivateRoom.name;
                renameRoomModal.style.display = 'flex';
                renameRoomConfirm.onclick = async () => {
                    const newName = renameRoomInput.value.trim();
                    if (!newName) {
                        renameRoomError.textContent = 'Введите название';
                        return;
                    }
                    try {
                        const res = await fetch(API_BASE + '/api/rooms/rename', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ roomId: currentPrivateRoom.id, username: currentUser.username, newName })
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error || 'Ошибка');
                        currentPrivateRoom.name = newName;
                        privateChatTitle.textContent = newName;
                        renameRoomModal.style.display = 'none';
                    } catch (err) {
                        renameRoomError.textContent = err.message;
                    }
                };
            });

            renameRoomCancel.addEventListener('click', () => {
                renameRoomModal.style.display = 'none';
            });

            privateChatParticipantCount.addEventListener('click', async () => {
                if (!currentPrivateRoom) return;
                try {
                    const res = await fetch(API_BASE + '/api/rooms/participants/' + currentPrivateRoom.id);
                    const data = await res.json();
                    participantsList.innerHTML = data.map(u => `<li>${escapeHtml(u)}</li>`).join('');
                    participantsModal.style.display = 'flex';
                } catch (err) {
                    alert('Не удалось загрузить список участников');
                }
            });

            participantsClose.addEventListener('click', () => {
                participantsModal.style.display = 'none';
            });

            // Локальное хранилище
            localChatBack.addEventListener('click', () => {
                if (currentRoom === '_localstorage') {
                    leaveRoom('_localstorage');
                }
                showInnerScreen('private-screen');
            });

            localChatAttach.addEventListener('click', () => attachMediaHandler('_localstorage'));

            localChatSend.addEventListener('click', () => {
                const text = localChatInput.value.trim();
                if (text) {
                    sendMessage('_localstorage', text);
                    localChatInput.value = '';
                }
            });

            localChatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    localChatSend.click();
                }
            });

            // Удаление аккаунта и выход
            document.getElementById('delete-account-btn').addEventListener('click', () => {
                modalTitle.textContent = 'Удалить аккаунт? Введите пароль';
                modalPassword.value = '';
                modalError.textContent = '';
                passwordModal.style.display = 'flex';
                modalConfirm.onclick = async () => {
                    const pwd = modalPassword.value.trim();
                    if (!pwd) return;
                    try {
                        const res = await fetch(API_BASE + '/api/delete-account', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: currentUser.username, password: pwd }) });
                        if (!res.ok) {
                            const err = await res.json();
                            modalError.textContent = err.error || 'Неверный пароль';
                            return;
                        }
                        localStorage.removeItem('chatxUser');
                        localStorage.removeItem('chatxUnread');
                        currentUser = null;
                        if (socket) socket.close();
                        passwordModal.style.display = 'none';
                        mainScreen.classList.add('screen-hidden');
                        authScreen.classList.remove('screen-hidden');
                    } catch (err) {
                        modalError.textContent = 'Ошибка сервера';
                    }
                };
                modalCancel.onclick = () => {
                    passwordModal.style.display = 'none';
                };
            });

            document.getElementById('logout-btn').addEventListener('click', () => {
                confirmModal.style.display = 'flex';
                document.getElementById('confirm-title').textContent = 'Вы уверены, что хотите выйти?';
                confirmYes.onclick = () => {
                    localStorage.removeItem('chatxUser');
                    currentUser = null;
                    if (socket) socket.close();
                    confirmModal.style.display = 'none';
                    mainScreen.classList.add('screen-hidden');
                    authScreen.classList.remove('screen-hidden');
                };
                confirmNo.onclick = () => {
                    confirmModal.style.display = 'none';
                };
            });

            if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                Notification.requestPermission();
            }
        })();
    </script>
</body>
</html>
