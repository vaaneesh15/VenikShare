<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatX</title>
    
    <!-- PWA метатеги -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ChatX">
    <meta name="theme-color" id="theme-color-meta" content="#4a3aff">
    <link rel="manifest" href="manifest.json">
    
    <!-- Socket.IO и Font Awesome -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* Глобальные запреты */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            --bg-gradient-start: #e9e9f0;
            --bg-gradient-end: #dadde8;
            --container-bg: rgba(240, 240, 245, 0.7);
            --container-border: rgba(255,255,255,0.5);
            --text-primary: #1a1a2e;
            --text-secondary: #2c3e50;
            --text-muted: #6b6b80;
            --accent: #4a3aff;
            --accent-light: #7a6aff;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(255,255,255,0.6);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            --icon-bg: white;
            --panel-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(255, 255, 255, 0.5);
            --chat-own-bg: var(--accent);
            --chat-other-bg: #e0e0f0;
            --chat-own-text: white;
            --chat-other-text: #1a1a2e;
            --unread-dot: #ff9800;
            --unread-dot-border: #ffffff;
            --reply-bg: rgba(0,0,0,0.05);
            --reply-highlight: #fff9c4;
            transition: background 0.2s, color 0.2s;
            
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-bg: rgba(30, 30, 46, 0.8);
            --container-border: rgba(255,255,255,0.15);
            --text-primary: #f0f0ff;
            --text-secondary: #ecf0f1;
            --text-muted: #8a8aa0;
            --accent: #6d5fff;
            --accent-light: #9a8cff;
            --card-bg: rgba(40, 40, 55, 0.7);
            --card-border: rgba(255,255,255,0.1);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --icon-bg: #2a2a40;
            --panel-bg: rgba(30, 30, 46, 0.8);
            --input-bg: rgba(40, 40, 55, 0.6);
            --chat-other-bg: #3a3a5a;
            --chat-other-text: #ffffff;
            --unread-dot: #ffb74d;
            --unread-dot-border: #1a1a2e;
            --reply-bg: rgba(255,255,255,0.1);
            --reply-highlight: #5d4a1f;
        }

        /* Экраны */
        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.3s;
        }
        .screen-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Экран входа – без прокрутки */
        .login-screen {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* запрещаем прокрутку */
        }
        .login-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            flex-shrink: 0;
            position: relative;
        }
        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-align: center;
        }
        .theme-toggle {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 20px;
            position: absolute;
            right: 0;
            top: 0;
        }
        .theme-toggle:active {
            transform: scale(0.94);
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 16px;
            border: 1px solid var(--container-border);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .input-group input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
        }
        .input-group input::placeholder {
            color: var(--text-muted);
        }
        .btn {
            background: var(--icon-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .status {
            text-align: center;
            color: var(--text-muted);
            margin: 8px 0;
            font-size: 14px;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .history-section {
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .history-section h4 {
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 16px;
        }
        .room-list {
            list-style: none;
            max-height: 150px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .room-item {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 8px 12px;
            margin-bottom: 4px;
            border: 1px solid var(--card-border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .room-item:active {
            background: var(--card-border);
        }
        .room-name {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .room-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .room-date {
            color: var(--text-muted);
            font-size: 12px;
        }
        .room-unread-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--unread-dot);
            border: 2px solid var(--unread-dot-border);
            box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
        }
        .delete-room-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            margin-left: 4px;
        }
        .delete-room-btn:active {
            color: var(--accent);
        }

        /* Экран чата – flex-колонка, верхняя панель не приклеена, но всегда сверху */
        .chat-screen {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            height: 100vh; /* вся высота экрана */
        }
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: max(24px, env(safe-area-inset-top)) 16px 12px 16px;
            border-bottom: 1px solid var(--container-border);
            flex-shrink: 0; /* не сжимается */
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10;
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .chat-header-left .theme-toggle {
            width: 40px;
            height: 40px;
            font-size: 18px;
            position: static;
        }
        .chat-room-id {
            background: var(--input-bg);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            border: 1px solid var(--card-border);
            cursor: pointer;
        }
        .chat-room-id:active {
            background: var(--card-bg);
        }
        .my-username {
            background: var(--icon-bg);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--card-border);
        }
        .participant-count {
            background: var(--icon-bg);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--card-border);
        }
        .chat-exit-btn {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 22px;
        }
        .chat-exit-btn:active {
            transform: scale(0.94);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            margin-bottom: 4px;
        }
        .message-own {
            justify-content: flex-end;
        }
        .message-bubble {
            max-width: 80%;
            background: var(--chat-other-bg);
            border-radius: 24px;
            padding: 10px 16px;
            border: 1px solid var(--card-border);
            word-break: break-word;
            color: var(--chat-other-text);
        }
        .message-bubble-own {
            background: var(--chat-own-bg);
            color: var(--chat-own-text);
            border-color: var(--accent-light);
        }
        .message-sender {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent);
        }
        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }
        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        /* Стили для ответов */
        .reply-indicator {
            background: var(--reply-bg);
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent);
            cursor: pointer;
            transition: background 0.2s;
        }
        .reply-indicator:active {
            background: var(--accent-light);
        }
        .reply-sender {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
        }
        .reply-text {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
            opacity: 0.8;
        }
        .message.highlight {
            background: var(--reply-highlight);
            transition: background 2s ease-out;
        }
        .reply-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 10px 16px;
            margin: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--card-border);
        }
        .reply-panel-content {
            flex: 1;
            min-width: 0;
        }
        .reply-panel-sender {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }
        .reply-panel-text {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .reply-panel-cancel {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            padding: 0 8px;
        }
        .reply-panel-cancel:active {
            color: var(--accent);
        }

        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--container-border);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* уходим под клавиатуру */
        }
        .chat-input-area textarea {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
            resize: none;
            min-height: 48px;
            max-height: 120px;
        }
        .chat-input-area button {
            width: 48px;
            height: 48px;
            border-radius: 30px;
            padding: 0;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <!-- Экран входа -->
    <div class="screen login-screen" id="login-screen">
        <div class="login-header">
            <h1>ChatX</h1>
            <div class="theme-toggle" id="login-theme-toggle">
                <i class="fas fa-sun"></i>
            </div>
        </div>

        <div class="panel">
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Имя пользователя">
            </div>
            <div class="input-group">
                <input type="text" id="room-id-input" placeholder="ID комнаты (латиница, цифры, дефис, _)">
            </div>
            <div class="flex-col">
                <button class="btn" id="connect-btn">Подключиться</button>
                <button class="btn btn-primary" id="create-peer-btn">➕ Создать комнату</button>
            </div>
            <div id="connection-status" class="status">Не подключено</div>
            <div id="debug-info" class="status" style="color: var(--accent); font-size: 12px;"></div>
        </div>

        <!-- История комнат -->
        <div class="panel history-section">
            <h4>Недавние комнаты</h4>
            <ul id="room-history-list" class="room-list"></ul>
        </div>
    </div>

    <!-- Экран чата -->
    <div class="screen chat-screen screen-hidden" id="chat-screen">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="theme-toggle" id="chat-theme-toggle">
                    <i class="fas fa-sun"></i>
                </div>
                <div class="chat-room-id" id="chat-room-id" title="Нажмите, чтобы скопировать ID">—</div>
                <div class="my-username" id="my-username"></div>
                <div class="participant-count" id="participant-count">0</div>
            </div>
            <div class="chat-exit-btn" id="chat-exit-btn" title="Выйти из комнаты">
                <i class="fas fa-times"></i>
            </div>
        </div>

        <!-- Панель ответа (изначально скрыта) -->
        <div id="reply-panel" class="reply-panel" style="display: none;">
            <div class="reply-panel-content">
                <div class="reply-panel-sender" id="reply-sender"></div>
                <div class="reply-panel-text" id="reply-text"></div>
            </div>
            <button class="reply-panel-cancel" id="reply-cancel">&times;</button>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input-area">
            <textarea id="chat-input" rows="1" placeholder="Написать..."></textarea>
            <button class="btn btn-primary" id="send-chat-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        (function() {
            // --- Тема ---
            const themeToggles = [
                document.getElementById('login-theme-toggle'),
                document.getElementById('chat-theme-toggle')
            ];
            const themeIcons = themeToggles.map(t => t.querySelector('i'));
            let currentTheme = localStorage.getItem('chatxTheme') || 'system';

            function setTheme(theme) {
                currentTheme = theme;
                localStorage.setItem('chatxTheme', theme);
                applyTheme();
            }

            function applyTheme() {
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                let isDark = false;
                if (currentTheme === 'dark') isDark = true;
                else if (currentTheme === 'system') isDark = systemDark;

                document.body.classList.toggle('dark', isDark);
                const iconClass = currentTheme === 'light' ? 'fas fa-sun' : (currentTheme === 'dark' ? 'fas fa-moon' : 'fas fa-circle-half-stroke');
                themeIcons.forEach(icon => icon.className = iconClass);
                
                const themeColorMeta = document.getElementById('theme-color-meta');
                if (themeColorMeta) {
                    themeColorMeta.setAttribute('content', isDark ? '#1a1a2e' : '#4a3aff');
                }
            }

            themeToggles.forEach(toggle => {
                toggle.addEventListener('click', () => {
                    if (currentTheme === 'light') setTheme('dark');
                    else if (currentTheme === 'dark') setTheme('system');
                    else setTheme('light');
                });
            });
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
            applyTheme();

            // --- Имя пользователя ---
            const usernameInput = document.getElementById('username-input');
            let myUsername = localStorage.getItem('chatxUsername') || 'Аноним';
            usernameInput.value = myUsername;
            usernameInput.addEventListener('change', () => {
                myUsername = usernameInput.value.trim() || 'Аноним';
                localStorage.setItem('chatxUsername', myUsername);
                const mySpan = document.getElementById('my-username');
                if (mySpan) mySpan.textContent = myUsername;
            });

            // --- Элементы ---
            const roomIdInput = document.getElementById('room-id-input');
            const connectBtn = document.getElementById('connect-btn');
            const createBtn = document.getElementById('create-peer-btn');
            const connectionStatus = document.getElementById('connection-status');
            const debugInfo = document.getElementById('debug-info');
            const loginScreen = document.getElementById('login-screen');
            const chatScreen = document.getElementById('chat-screen');
            const chatRoomId = document.getElementById('chat-room-id');
            const myUsernameSpan = document.getElementById('my-username');
            const participantCount = document.getElementById('participant-count');
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const sendChatBtn = document.getElementById('send-chat-btn');
            const chatExitBtn = document.getElementById('chat-exit-btn');
            const roomHistoryList = document.getElementById('room-history-list');
            const replyPanel = document.getElementById('reply-panel');
            const replySender = document.getElementById('reply-sender');
            const replyText = document.getElementById('reply-text');
            const replyCancel = document.getElementById('reply-cancel');

            // --- Состояние ---
            let currentRoomId = null;
            let isConnected = false;
            let unreadCounts = {};
            let messagesMap = new Map();
            let replyToMessage = null;

            try {
                const saved = localStorage.getItem('chatxUnread');
                if (saved) unreadCounts = JSON.parse(saved);
            } catch (e) {}

            function saveUnread() {
                localStorage.setItem('chatxUnread', JSON.stringify(unreadCounts));
            }

            // --- Подключение к серверу ---
            const SERVER_URL = 'https://chatx-server-pyyi.onrender.com';
            const socket = io(SERVER_URL, {
                reconnectionAttempts: 5,
                timeout: 10000
            });

            socket.on('connect', () => {
                console.log('✅ Подключено к серверу', socket.id);
                isConnected = true;
                setDebug('✅ Подключено к серверу');
                loadRooms();
            });

            socket.on('connect_error', (err) => {
                console.error('❌ Ошибка подключения к серверу:', err.message);
                setDebug('❌ Ошибка подключения к серверу');
                isConnected = false;
            });

            socket.on('disconnect', () => {
                console.log('❌ Отключено от сервера');
                setDebug('❌ Отключено от сервера');
                isConnected = false;
                exitToLogin();
            });

            function setDebug(msg) {
                debugInfo.textContent = msg;
                console.log('[DEBUG]', msg);
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            function emitWhenConnected(event, data) {
                if (isConnected) {
                    console.log(`📤 Отправка события ${event}`, data);
                    socket.emit(event, data);
                } else {
                    console.warn(`⚠️ Событие ${event} не отправлено: нет соединения`);
                    alert('Нет подключения к серверу. Подождите или перезагрузите страницу.');
                }
            }

            function setReply(message) {
                replyToMessage = message;
                if (message) {
                    replySender.textContent = message.sender;
                    replyText.textContent = message.text;
                    replyPanel.style.display = 'flex';
                } else {
                    replyToMessage = null;
                    replyPanel.style.display = 'none';
                }
            }

            replyCancel.addEventListener('click', () => {
                setReply(null);
            });

            function copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => {
                    setDebug('✅ Текст скопирован');
                }).catch(() => {
                    setDebug('❌ Не удалось скопировать');
                });
            }

            function scrollToMessage(messageId) {
                const msgElement = messagesMap.get(messageId);
                if (msgElement) {
                    msgElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    msgElement.classList.add('highlight');
                    setTimeout(() => {
                        msgElement.classList.remove('highlight');
                    }, 2000);
                }
            }

            function createMessageElement(msg, own) {
                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${own ? 'message-own' : ''}`;
                msgDiv.dataset.id = msg.id;

                let replyHtml = '';
                if (msg.replyToId) {
                    replyHtml = `
                        <div class="reply-indicator" data-reply-id="${msg.replyToId}">
                            <div class="reply-sender">${escapeHtml(msg.replyToSender)}</div>
                            <div class="reply-text">${escapeHtml(msg.replyToText)}</div>
                        </div>
                    `;
                }

                const senderHtml = own ? '' : `<div class="message-sender">${escapeHtml(msg.sender)}</div>`;
                msgDiv.innerHTML = `
                    <div class="message-bubble ${own ? 'message-bubble-own' : ''}">
                        ${senderHtml}
                        ${replyHtml}
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;

                msgDiv.addEventListener('click', (e) => {
                    if (e.target.closest('.reply-indicator')) return;
                    copyToClipboard(msg.text);
                });

                const replyIndicator = msgDiv.querySelector('.reply-indicator');
                if (replyIndicator) {
                    replyIndicator.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const targetId = parseInt(replyIndicator.dataset.replyId);
                        scrollToMessage(targetId);
                    });
                }

                let touchStartX = 0, touchStartY = 0, swiped = false;
                msgDiv.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    swiped = false;
                }, { passive: true });

                msgDiv.addEventListener('touchmove', (e) => {
                    if (swiped) return;
                    const dx = e.touches[0].clientX - touchStartX;
                    const dy = e.touches[0].clientY - touchStartY;
                    if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) && dx < 0) {
                        swiped = true;
                        e.preventDefault();
                        setReply({ id: msg.id, sender: msg.sender, text: msg.text });
                    }
                }, { passive: false });

                return msgDiv;
            }

            function addChatMessage(msg, own = false) {
                const msgDiv = createMessageElement(msg, own);
                chatMessages.appendChild(msgDiv);
                messagesMap.set(msg.id, msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function updateParticipantCount(count) {
                participantCount.textContent = count;
            }

            function enterChatScreen(roomId) {
                currentRoomId = roomId;
                chatRoomId.textContent = roomId;
                myUsernameSpan.textContent = myUsername;
                chatMessages.innerHTML = '';
                messagesMap.clear();
                loginScreen.classList.add('screen-hidden');
                chatScreen.classList.remove('screen-hidden');
                setReply(null);
                
                if (unreadCounts[roomId]) {
                    delete unreadCounts[roomId];
                    saveUnread();
                }
            }

            function exitToLogin() {
                if (currentRoomId) {
                    emitWhenConnected('leaveRoom', { roomId: currentRoomId });
                    currentRoomId = null;
                }
                chatScreen.classList.add('screen-hidden');
                loginScreen.classList.remove('screen-hidden');
                connectionStatus.textContent = 'Не подключено';
                setDebug('');
                loadRooms();
            }

            chatExitBtn.addEventListener('click', exitToLogin);

            chatRoomId.addEventListener('click', () => {
                if (currentRoomId) {
                    navigator.clipboard.writeText(currentRoomId).then(() => {
                        setDebug('✅ ID скопирован');
                        const original = connectionStatus.textContent;
                        connectionStatus.textContent = 'ID скопирован!';
                        setTimeout(() => { connectionStatus.textContent = original; }, 2000);
                    });
                }
            });

            socket.on('roomCreated', (data) => {
                setDebug(`✅ Комната ${data.roomId} создана`);
                enterChatScreen(data.roomId);
            });

            socket.on('roomJoined', (data) => {
                setDebug(`✅ Подключено к комнате ${data.roomId}`);
                enterChatScreen(data.roomId);
                if (data.messages) {
                    data.messages.forEach(msg => {
                        addChatMessage(msg, msg.sender === myUsername);
                    });
                }
                updateParticipantCount(data.userCount);
            });

            socket.on('roomError', (data) => {
                setDebug(`❌ Ошибка: ${data.message}`);
                alert(data.message);
            });

            socket.on('newMessage', (data) => {
                addChatMessage(data, false);
                if (data.roomId !== currentRoomId || document.hidden) {
                    unreadCounts[data.roomId] = (unreadCounts[data.roomId] || 0) + 1;
                    saveUnread();
                    if (!currentRoomId) loadRooms();
                    showNotification(data.sender, data.text, data.roomId);
                }
            });

            socket.on('messageSent', (data) => {
                addChatMessage(data, true);
            });

            socket.on('userCount', (data) => {
                updateParticipantCount(data.count);
            });

            socket.on('roomList', (data) => {
                updateRoomList(data.rooms);
            });

            socket.on('roomDeleted', (data) => {
                loadRooms();
            });

            function requestNotificationPermission() {
                if (!("Notification" in window)) return;
                if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }
            }
            requestNotificationPermission();

            function showNotification(title, body, roomId) {
                if (!("Notification" in window) || Notification.permission !== "granted") return;
                const notification = new Notification(title, {
                    body: body,
                    icon: '/icon.svg',
                    tag: roomId,
                    renotify: true,
                });
                notification.onclick = () => {
                    window.focus();
                    roomIdInput.value = roomId;
                    connectBtn.click();
                };
            }

            function loadRooms() {
                emitWhenConnected('getRooms', {});
            }

            function updateRoomList(rooms) {
                if (!roomHistoryList) return;
                if (!rooms || rooms.length === 0) {
                    roomHistoryList.innerHTML = '<li class="room-item" style="justify-content:center; color: var(--text-primary); opacity: 0.8;">Нет истории</li>';
                    return;
                }
                roomHistoryList.innerHTML = rooms.map(room => {
                    const hasUnread = unreadCounts[room.roomId] > 0;
                    return `
                    <li class="room-item" data-roomid="${room.roomId}">
                        <span class="room-name">${room.roomId}</span>
                        <div class="room-meta">
                            <span class="room-date">${new Date(room.lastActive).toLocaleDateString()}</span>
                            ${hasUnread ? '<span class="room-unread-dot" title="Новые сообщения"></span>' : ''}
                            <button class="delete-room-btn" onclick="event.stopPropagation(); window.deleteRoom('${room.roomId}')">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </li>
                `}).join('');

                document.querySelectorAll('.room-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const rid = el.dataset.roomid;
                        if (rid) {
                            roomIdInput.value = rid;
                            connectBtn.click();
                        }
                    });
                });
            }

            window.deleteRoom = (roomId) => {
                emitWhenConnected('deleteRoom', { roomId });
            };

            createBtn.addEventListener('click', () => {
                const roomId = roomIdInput.value.trim();
                if (!roomId) {
                    alert('Введите ID комнаты');
                    return;
                }
                if (!/^[a-zA-Z0-9_-]+$/.test(roomId)) {
                    alert('ID может содержать только латинские буквы, цифры, дефис и подчеркивание');
                    return;
                }
                emitWhenConnected('createRoom', { roomId });
            });

            connectBtn.addEventListener('click', () => {
                const roomId = roomIdInput.value.trim();
                if (!roomId) {
                    alert('Введите ID комнаты');
                    return;
                }
                emitWhenConnected('joinRoom', { roomId, username: myUsername });
            });

            sendChatBtn.addEventListener('click', () => {
                const text = chatInput.value.trim();
                if (!text || !currentRoomId) return;

                const messageData = {
                    roomId: currentRoomId,
                    sender: myUsername,
                    text
                };
                if (replyToMessage) {
                    messageData.replyToId = replyToMessage.id;
                    messageData.replyToSender = replyToMessage.sender;
                    messageData.replyToText = replyToMessage.text;
                }

                emitWhenConnected('sendMessage', messageData);
                chatInput.value = '';
                setReply(null);
            });

            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendChatBtn.click();
                }
            });
        })();
    </script>
</body>
</html>
