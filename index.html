<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatX</title>
    
    <!-- PWA метатеги -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ChatX">
    <meta name="theme-color" id="theme-color-meta" content="#4a3aff">
    <link rel="manifest" href="manifest.json">
    
    <!-- Socket.IO и Font Awesome -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        body {
            --bg-gradient-start: #e9e9f0;
            --bg-gradient-end: #dadde8;
            --container-bg: rgba(240, 240, 245, 0.7);
            --container-border: rgba(255,255,255,0.5);
            --text-primary: #1a1a2e;
            --text-secondary: #2c3e50;
            --text-muted: #6b6b80;
            --accent: #4a3aff;
            --accent-light: #7a6aff;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(255,255,255,0.6);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            --icon-bg: white;
            --panel-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(255, 255, 255, 0.5);
            --chat-own-bg: var(--accent);
            --chat-other-bg: #e0e0f0;
            --chat-own-text: white;
            --chat-other-text: #1a1a2e;
            transition: background 0.2s, color 0.2s;
            
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            position: relative;
            min-height: 100vh;
            height: auto;
        }

        /* Огромный фиксированный фон, перекрывающий всё */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            z-index: -2;
        }

        /* Дополнительный слой для полного покрытия */
        body::after {
            content: '';
            position: fixed;
            top: -50vh;
            left: -50vw;
            width: 200vw;
            height: 200vh;
            background: inherit;
            z-index: -1;
        }

        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-bg: rgba(30, 30, 46, 0.8);
            --container-border: rgba(255,255,255,0.15);
            --text-primary: #f0f0ff;
            --text-secondary: #ecf0f1;
            --text-muted: #8a8aa0;
            --accent: #6d5fff;
            --accent-light: #9a8cff;
            --card-bg: rgba(40, 40, 55, 0.7);
            --card-border: rgba(255,255,255,0.1);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --icon-bg: #2a2a40;
            --panel-bg: rgba(30, 30, 46, 0.8);
            --input-bg: rgba(40, 40, 55, 0.6);
            --chat-other-bg: #3a3a5a;
            --chat-other-text: #ffffff;
        }

        .app {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent;
            display: flex;
            flex-direction: column;
        }

        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .screen-hidden {
            opacity: 0;
            pointer-events: none;
        }

        #main-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .screen-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .inner-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .inner-screen-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .page-header, .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: max(24px, env(safe-area-inset-top)) 16px 12px 16px;
            border-bottom: 1px solid var(--container-border);
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            flex-shrink: 0;
            min-height: 68px;
        }
        .page-header h2, .chat-header-left h2 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }
        .theme-toggle {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 20px;
        }
        .theme-toggle:active {
            transform: scale(0.94);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-left .back-btn {
            background: var(--icon-bg);
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 20px;
        }
        .chat-header-left .back-btn:active {
            transform: scale(0.94);
        }
        .participant-count {
            background: var(--icon-bg);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--card-border);
        }

        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 8px 16px calc(70px + env(safe-area-inset-bottom)) 16px; /* убрал лишние 50px */
            border-top: 1px solid var(--container-border);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            width: 100%;
            z-index: 10;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            padding: 4px 0;
            transition: color 0.2s;
        }
        .nav-item i {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }
        .nav-item.active {
            color: var(--accent);
        }

        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 16px;
            border: 1px solid var(--container-border);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .input-group input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
        }
        .input-group input::placeholder {
            color: var(--text-muted);
        }
        .btn {
            background: var(--icon-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .status {
            text-align: center;
            color: var(--text-muted);
            margin: 8px 0;
            font-size: 14px;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .room-list {
            list-style: none;
        }
        .room-item {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px solid var(--card-border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-item:active {
            background: var(--card-border);
        }
        .room-name {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 16px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .room-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            padding: 0 8px;
        }
        .room-delete:active {
            color: var(--accent);
        }

        .chat-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        .message {
            display: flex;
            margin-bottom: 4px;
        }
        .message-own {
            justify-content: flex-end;
        }
        .message-bubble {
            max-width: 80%;
            background: var(--chat-other-bg);
            border-radius: 24px;
            padding: 10px 16px;
            border: 1px solid var(--card-border);
            word-break: break-word;
            color: var(--chat-other-text);
        }
        .message-bubble-own {
            background: var(--chat-own-bg);
            color: var(--chat-own-text);
            border-color: var(--accent-light);
        }
        .message-sender {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent);
        }
        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }
        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px calc(70px + env(safe-area-inset-bottom)) 16px; /* убрал лишние 30px */
            border-top: 1px solid var(--container-border);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }
        .chat-input-area textarea {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 12px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }
        .chat-input-area button {
            width: 48px;
            height: 48px;
            border-radius: 30px;
            padding: 0;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            padding: 24px;
            max-width: 90%;
            width: 400px;
            border: 1px solid var(--container-border);
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 16px;
        }

        .username-edit {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .edit-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
        }
        .edit-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Экран входа -->
        <div class="screen" id="auth-screen">
            <div class="page-header">
                <h2>ChatX</h2>
                <div></div>
            </div>
            <div class="auth-container">
                <div class="panel">
                    <div class="input-group">
                        <input type="text" id="auth-username" placeholder="Имя пользователя">
                    </div>
                    <div class="input-group">
                        <input type="password" id="auth-password" placeholder="Пароль">
                    </div>
                    <div class="flex-col">
                        <button class="btn btn-primary" id="auth-login">Войти</button>
                        <button class="btn" id="auth-register">Зарегистрироваться</button>
                    </div>
                    <div id="auth-status" class="status"></div>
                </div>
            </div>
        </div>

        <!-- Главное приложение -->
        <div class="screen screen-hidden" id="main-screen">
            <div class="screen-container">
                <!-- Профиль -->
                <div class="inner-screen" id="profile-screen">
                    <div class="page-header">
                        <h2>Профиль</h2>
                        <div class="theme-toggle" id="profile-theme-toggle">
                            <i class="fas fa-sun"></i>
                        </div>
                    </div>
                    <div class="page-content">
                        <div class="panel">
                            <div style="margin-bottom: 20px;">
                                <div style="color: var(--text-primary); font-size: 18px; margin-bottom: 8px;">Имя пользователя</div>
                                <div class="username-edit">
                                    <span style="color: var(--accent); font-size: 24px; font-weight: 600;" id="profile-username"></span>
                                    <button class="edit-btn" id="edit-username-btn"><i class="fas fa-pencil-alt"></i></button>
                                </div>
                            </div>
                        </div>
                        <div style="flex:1;"></div>
                        <button class="btn" id="logout-btn" style="margin-bottom: 8px;">Выйти</button>
                        <button class="btn" id="delete-account-btn" style="background: #ff6b6b; color: white;">Удалить аккаунт</button>
                    </div>
                </div>

                <!-- Публичный чат -->
                <div class="inner-screen inner-screen-hidden" id="public-screen">
                    <div class="chat-header">
                        <div class="chat-header-left">
                            <div class="back-btn" id="public-back">
                                <i class="fas fa-arrow-left"></i>
                            </div>
                            <h2>Публичный чат</h2>
                        </div>
                        <div class="participant-count" id="public-participant-count">0</div>
                    </div>
                    <div class="chat-messages" id="public-messages"></div>
                    <div class="chat-input-area" id="public-input-area">
                        <textarea id="public-input" rows="1" placeholder="Написать..."></textarea>
                        <button class="btn btn-primary" id="public-send">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <!-- Личные комнаты -->
                <div class="inner-screen inner-screen-hidden" id="private-screen">
                    <div class="page-header">
                        <h2>Личные комнаты</h2>
                        <div class="participant-count" id="private-room-count">0</div>
                    </div>
                    <div class="page-content">
                        <button class="btn btn-primary" id="create-room-btn" style="margin-bottom: 16px;">➕ Войти / Создать</button>
                        <div id="private-room-list" class="room-list"></div>
                    </div>
                </div>

                <!-- Личный чат -->
                <div class="inner-screen inner-screen-hidden" id="private-chat-screen">
                    <div class="chat-header">
                        <div class="chat-header-left">
                            <div class="back-btn" id="private-chat-back">
                                <i class="fas fa-arrow-left"></i>
                            </div>
                            <h2 id="private-chat-title"></h2>
                        </div>
                        <div class="participant-count" id="private-chat-participant-count">0</div>
                    </div>
                    <div class="chat-messages" id="private-chat-messages"></div>
                    <div class="chat-input-area" id="private-chat-input-area">
                        <textarea id="private-chat-input" rows="1" placeholder="Написать..."></textarea>
                        <button class="btn btn-primary" id="private-chat-send">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Нижняя навигация -->
            <div class="bottom-nav" id="bottom-nav">
                <div class="nav-item" data-screen="profile">
                    <i class="fas fa-user"></i>
                    <span>Профиль</span>
                </div>
                <div class="nav-item" data-screen="public">
                    <i class="fas fa-globe"></i>
                    <span>Публичный</span>
                </div>
                <div class="nav-item" data-screen="private">
                    <i class="fas fa-lock"></i>
                    <span>Личные</span>
                </div>
            </div>
        </div>

        <!-- Модальное окно подтверждения (универсальное) -->
        <div id="password-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3 style="color: var(--text-primary); margin-bottom: 16px;" id="modal-title">Введите пароль</h3>
                <input type="password" id="modal-password" placeholder="Пароль" style="width:100%; padding:12px; border-radius:30px; border:1px solid var(--card-border); background:var(--input-bg); color:var(--text-primary);">
                <div id="modal-error" style="color:#ff6b6b; margin-top:8px; font-size:14px;"></div>
                <div class="modal-buttons">
                    <button class="btn" id="modal-cancel">Отмена</button>
                    <button class="btn btn-primary" id="modal-confirm">Подтвердить</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно подтверждения выхода (без пароля) -->
        <div id="confirm-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3 style="color: var(--text-primary); margin-bottom: 16px;" id="confirm-title">Вы уверены?</h3>
                <div class="modal-buttons">
                    <button class="btn" id="confirm-no">Нет</button>
                    <button class="btn btn-primary" id="confirm-yes">Да</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const API_BASE = 'https://chatx-server-pyyi.onrender.com';
            let currentUser = null;
            let currentRoom = null;
            let socket = null;
            let currentPrivateRoom = null;

            // Тема
            let currentTheme = localStorage.getItem('chatxTheme') || 'system';
            function applyTheme() {
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                let isDark = false;
                if (currentTheme === 'dark') isDark = true;
                else if (currentTheme === 'system') isDark = systemDark;
                document.body.classList.toggle('dark', isDark);
                const icon = document.querySelector('#profile-theme-toggle i');
                if (icon) {
                    icon.className = currentTheme === 'light' ? 'fas fa-sun' : (currentTheme === 'dark' ? 'fas fa-moon' : 'fas fa-circle-half-stroke');
                }
                const themeColorMeta = document.getElementById('theme-color-meta');
                if (themeColorMeta) {
                    themeColorMeta.setAttribute('content', isDark ? '#1a1a2e' : '#4a3aff');
                }
            }
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
            applyTheme();

            // Элементы
            const authScreen = document.getElementById('auth-screen');
            const mainScreen = document.getElementById('main-screen');
            const profileScreen = document.getElementById('profile-screen');
            const publicScreen = document.getElementById('public-screen');
            const privateScreen = document.getElementById('private-screen');
            const privateChatScreen = document.getElementById('private-chat-screen');
            const navItems = document.querySelectorAll('.nav-item');
            const bottomNav = document.getElementById('bottom-nav');
            const profileUsername = document.getElementById('profile-username');
            const authUsername = document.getElementById('auth-username');
            const authPassword = document.getElementById('auth-password');
            const authStatus = document.getElementById('auth-status');
            const authLogin = document.getElementById('auth-login');
            const authRegister = document.getElementById('auth-register');
            const editUsernameBtn = document.getElementById('edit-username-btn');
            const publicMessages = document.getElementById('public-messages');
            const publicInput = document.getElementById('public-input');
            const publicSend = document.getElementById('public-send');
            const publicParticipantCount = document.getElementById('public-participant-count');
            const publicBack = document.getElementById('public-back');
            const privateRoomList = document.getElementById('private-room-list');
            const privateRoomCount = document.getElementById('private-room-count');
            const createRoomBtn = document.getElementById('create-room-btn');
            const privateChatMessages = document.getElementById('private-chat-messages');
            const privateChatInput = document.getElementById('private-chat-input');
            const privateChatSend = document.getElementById('private-chat-send');
            const privateChatParticipantCount = document.getElementById('private-chat-participant-count');
            const privateChatBack = document.getElementById('private-chat-back');
            const privateChatTitle = document.getElementById('private-chat-title');
            
            // Модалки
            const passwordModal = document.getElementById('password-modal');
            const confirmModal = document.getElementById('confirm-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalPassword = document.getElementById('modal-password');
            const modalError = document.getElementById('modal-error');
            const modalCancel = document.getElementById('modal-cancel');
            const modalConfirm = document.getElementById('modal-confirm');
            const confirmNo = document.getElementById('confirm-no');
            const confirmYes = document.getElementById('confirm-yes');

            const profileThemeToggle = document.getElementById('profile-theme-toggle');

            profileThemeToggle.addEventListener('click', () => {
                if (currentTheme === 'light') currentTheme = 'dark';
                else if (currentTheme === 'dark') currentTheme = 'system';
                else currentTheme = 'light';
                localStorage.setItem('chatxTheme', currentTheme);
                applyTheme();
            });

            // Навигация
            function showInnerScreen(screenId) {
                profileScreen.classList.add('inner-screen-hidden');
                publicScreen.classList.add('inner-screen-hidden');
                privateScreen.classList.add('inner-screen-hidden');
                privateChatScreen.classList.add('inner-screen-hidden');
                document.getElementById(screenId).classList.remove('inner-screen-hidden');

                const targetNav = screenId.replace('-screen', '');
                navItems.forEach(item => {
                    const screen = item.dataset.screen;
                    if (screen === targetNav) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });

                // Управление видимостью нижней навигации: в чатах скрываем, в остальных показываем
                if (screenId === 'public-screen' || screenId === 'private-chat-screen') {
                    bottomNav.style.display = 'none';
                } else {
                    bottomNav.style.display = 'flex';
                }

                // Загружаем список личных комнат при переходе на экран личных комнат
                if (screenId === 'private-screen') {
                    loadPrivateRooms();
                }
            }

            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    const screen = item.dataset.screen;
                    if (screen === 'public') {
                        if (currentRoom) leaveRoom(currentRoom);
                        joinRoom('public');
                        showInnerScreen('public-screen');
                    } else if (screen === 'private') {
                        showInnerScreen('private-screen');
                    } else {
                        showInnerScreen('profile-screen');
                    }
                });
            });

            // Авторизация
            async function login(username, password) {
                try {
                    const res = await fetch(API_BASE + '/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Ошибка');
                    currentUser = { username };
                    localStorage.setItem('chatxUser', JSON.stringify(currentUser));
                    authScreen.classList.add('screen-hidden');
                    mainScreen.classList.remove('screen-hidden');
                    profileUsername.textContent = username;
                    connectSocket();
                    loadPrivateRooms();
                    showInnerScreen('profile-screen');
                } catch (err) {
                    authStatus.textContent = err.message;
                }
            }

            async function register(username, password) {
                try {
                    const res = await fetch(API_BASE + '/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Ошибка');
                    authStatus.textContent = 'Регистрация успешна, выполняем вход...';
                    await login(username, password);
                } catch (err) {
                    authStatus.textContent = err.message;
                }
            }

            authLogin.addEventListener('click', () => {
                const u = authUsername.value.trim();
                const p = authPassword.value.trim();
                if (u && p) login(u, p);
                else authStatus.textContent = 'Введите имя и пароль';
            });

            authRegister.addEventListener('click', () => {
                const u = authUsername.value.trim();
                const p = authPassword.value.trim();
                if (u && p) register(u, p);
                else authStatus.textContent = 'Введите имя и пароль';
            });

            const savedUser = localStorage.getItem('chatxUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                authScreen.classList.add('screen-hidden');
                mainScreen.classList.remove('screen-hidden');
                profileUsername.textContent = currentUser.username;
                connectSocket();
                loadPrivateRooms();
                showInnerScreen('profile-screen');
            } else {
                authScreen.classList.remove('screen-hidden');
                mainScreen.classList.add('screen-hidden');
            }

            // Смена имени
            editUsernameBtn.addEventListener('click', () => {
                modalTitle.textContent = 'Смена имени. Введите пароль и новое имя';
                modalPassword.value = '';
                modalError.textContent = '';
                passwordModal.style.display = 'flex';
                modalConfirm.onclick = async () => {
                    const pwd = modalPassword.value.trim();
                    const newUsername = prompt('Введите новое имя пользователя:');
                    if (!newUsername) {
                        passwordModal.style.display = 'none';
                        return;
                    }
                    try {
                        const res = await fetch(API_BASE + '/api/change-username', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ oldUsername: currentUser.username, newUsername, password: pwd })
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error || 'Ошибка');
                        currentUser.username = newUsername;
                        localStorage.setItem('chatxUser', JSON.stringify(currentUser));
                        profileUsername.textContent = newUsername;
                        // Перезагружаем список комнат, чтобы обновить имя
                        loadPrivateRooms();
                        if (currentRoom) {
                            leaveRoom(currentRoom);
                            joinRoom(currentRoom, currentPrivateRoom?.name);
                        }
                        passwordModal.style.display = 'none';
                    } catch (err) {
                        modalError.textContent = err.message;
                    }
                };
                modalCancel.onclick = () => {
                    passwordModal.style.display = 'none';
                };
            });

            // Socket
            function connectSocket() {
                if (socket) socket.close();
                socket = io(API_BASE, { reconnectionAttempts: 5, timeout: 10000 });
                socket.on('connect', () => console.log('✅ Socket connected'));
                socket.on('roomError', (data) => alert(data.message));
                socket.on('roomJoined', (data) => {
                    console.log('✅ roomJoined', data.roomId, data.messages.length);
                    if (data.roomId === currentRoom) {
                        displayMessages(data.roomId, data.messages);
                        if (data.roomId === 'public') {
                            publicParticipantCount.textContent = data.userCount;
                        } else if (data.roomId === currentPrivateRoom?.id) {
                            privateChatParticipantCount.textContent = data.userCount;
                        }
                    }
                });
                socket.on('newMessage', (data) => {
                    console.log('📩 newMessage', data);
                    if (data.roomId === currentRoom) {
                        addMessageToChat(data);
                    }
                });
                socket.on('userCount', (data) => {
                    if (currentRoom === 'public') publicParticipantCount.textContent = data.count;
                    else if (currentRoom === currentPrivateRoom?.id) privateChatParticipantCount.textContent = data.count;
                });
            }

            function joinRoom(roomId, roomName = null) {
                if (!socket || !currentUser) return;
                socket.emit('joinRoom', { roomId, username: currentUser.username });
                currentRoom = roomId;
                if (roomId === 'public') return;
                currentPrivateRoom = { id: roomId, name: roomName || roomId };
                privateChatTitle.textContent = roomName || roomId;
            }

            function leaveRoom(roomId) {
                if (socket && roomId) socket.emit('leaveRoom', { roomId });
                if (currentRoom === roomId) {
                    currentRoom = null;
                    if (roomId !== 'public') currentPrivateRoom = null;
                }
            }

            function sendMessage(roomId, text) {
                if (!socket || !currentUser) return;
                socket.emit('sendMessage', { roomId, sender: currentUser.username, text });
                // Не добавляем локально, сервер пришлёт обратно
            }

            function addMessageToChat(msg) {
                const container = msg.roomId === 'public' ? publicMessages : (msg.roomId === currentPrivateRoom?.id ? privateChatMessages : null);
                if (!container) return;
                // Проверяем, нет ли уже такого сообщения (по id)
                if (container.querySelector(`[data-msg-id="${msg.id}"]`)) return;
                const own = msg.sender === currentUser.username;
                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const div = document.createElement('div');
                div.className = `message ${own ? 'message-own' : ''}`;
                div.setAttribute('data-msg-id', msg.id);
                div.innerHTML = `
                    <div class="message-bubble ${own ? 'message-bubble-own' : ''}">
                        ${own ? '' : `<div class="message-sender">${escapeHtml(msg.sender)}</div>`}
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                div.addEventListener('click', () => copyToClipboard(msg.text));
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            function displayMessages(roomId, messages) {
                const container = roomId === 'public' ? publicMessages : (roomId === currentPrivateRoom?.id ? privateChatMessages : null);
                if (!container) return;
                container.innerHTML = '';
                messages.forEach(msg => {
                    const own = msg.sender === currentUser.username;
                    const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const div = document.createElement('div');
                    div.className = `message ${own ? 'message-own' : ''}`;
                    div.setAttribute('data-msg-id', msg.id);
                    div.innerHTML = `
                        <div class="message-bubble ${own ? 'message-bubble-own' : ''}">
                            ${own ? '' : `<div class="message-sender">${escapeHtml(msg.sender)}</div>`}
                            <div class="message-text">${escapeHtml(msg.text)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                    div.addEventListener('click', () => copyToClipboard(msg.text));
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, m => {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            function copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => console.log('Copied')).catch(() => {});
            }

            // Публичный чат
            publicBack.addEventListener('click', () => {
                leaveRoom('public');
                showInnerScreen('profile-screen');
            });

            publicSend.addEventListener('click', () => {
                const text = publicInput.value.trim();
                if (text && currentRoom === 'public') {
                    sendMessage('public', text);
                    publicInput.value = '';
                }
            });

            publicInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    publicSend.click();
                }
            });

            // Личные комнаты
            async function loadPrivateRooms() {
                if (!currentUser) return;
                try {
                    const res = await fetch(API_BASE + '/api/rooms/list/' + currentUser.username);
                    const rooms = await res.json();
                    privateRoomList.innerHTML = rooms.map(r => `
                        <div class="room-item" data-roomid="${r.id}" data-roomname="${r.name}">
                            <span class="room-name">${escapeHtml(r.name)}</span>
                            <button class="room-delete" data-roomid="${r.id}"><i class="fas fa-times"></i></button>
                        </div>
                    `).join('');
                    privateRoomCount.textContent = rooms.length;
                    document.querySelectorAll('.room-item').forEach(el => {
                        el.addEventListener('click', (e) => {
                            if (e.target.closest('.room-delete')) return;
                            const rid = el.dataset.roomid;
                            const rname = el.dataset.roomname;
                            promptPasswordForRoom(rid, rname, true);
                        });
                    });
                    document.querySelectorAll('.room-delete').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            promptPasswordForRoom(btn.dataset.roomid, null, false, true);
                        });
                    });
                } catch (err) {
                    console.error(err);
                }
            }

            function promptPasswordForRoom(roomId, roomName, shouldJoin = true, isDelete = false) {
                modalTitle.textContent = isDelete ? 'Удалить комнату? Введите пароль' : 'Введите пароль комнаты';
                modalPassword.value = '';
                modalError.textContent = '';
                passwordModal.style.display = 'flex';
                const onConfirm = async () => {
                    const pwd = modalPassword.value.trim();
                    if (!pwd) return;
                    try {
                        if (isDelete) {
                            const check = await fetch(API_BASE + '/api/rooms/check-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, password: pwd }) });
                            if (!check.ok) {
                                const err = await check.json();
                                modalError.textContent = err.error || 'Неверный пароль';
                                return;
                            }
                            await fetch(API_BASE + '/api/rooms/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, username: currentUser.username }) });
                            loadPrivateRooms();
                            passwordModal.style.display = 'none';
                        } else {
                            const check = await fetch(API_BASE + '/api/rooms/check-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, password: pwd }) });
                            if (check.ok) {
                                await fetch(API_BASE + '/api/rooms/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, username: currentUser.username }) });
                                passwordModal.style.display = 'none';
                                if (shouldJoin) {
                                    if (currentRoom) leaveRoom(currentRoom);
                                    joinRoom(roomId, roomName);
                                    showInnerScreen('private-chat-screen');
                                }
                            } else if (check.status === 404) {
                                const createRes = await fetch(API_BASE + '/api/rooms/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, roomName, password: pwd, creator: currentUser.username }) });
                                if (!createRes.ok) {
                                    const err = await createRes.json();
                                    modalError.textContent = err.error || 'Ошибка создания';
                                    return;
                                }
                                passwordModal.style.display = 'none';
                                if (shouldJoin) {
                                    if (currentRoom) leaveRoom(currentRoom);
                                    joinRoom(roomId, roomName);
                                    showInnerScreen('private-chat-screen');
                                }
                            } else {
                                const err = await check.json();
                                modalError.textContent = err.error || 'Неверный пароль';
                            }
                        }
                    } catch (err) {
                        modalError.textContent = 'Ошибка сервера';
                    }
                };
                modalConfirm.onclick = onConfirm;
                modalCancel.onclick = () => {
                    passwordModal.style.display = 'none';
                };
            }

            createRoomBtn.addEventListener('click', async () => {
                const roomId = prompt('Введите ID комнаты (латиница, цифры, дефис, _)');
                if (!roomId) return;
                const roomName = prompt('Введите название комнаты');
                if (!roomName) return;
                const password = prompt('Введите пароль для комнаты');
                if (!password) return;
                try {
                    const check = await fetch(API_BASE + '/api/rooms/check-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, password }) });
                    if (check.ok) {
                        await fetch(API_BASE + '/api/rooms/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, username: currentUser.username }) });
                        if (currentRoom) leaveRoom(currentRoom);
                        joinRoom(roomId, roomName);
                        showInnerScreen('private-chat-screen');
                    } else if (check.status === 404) {
                        const res = await fetch(API_BASE + '/api/rooms/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, roomName, password, creator: currentUser.username }) });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error);
                        if (currentRoom) leaveRoom(currentRoom);
                        joinRoom(roomId, roomName);
                        showInnerScreen('private-chat-screen');
                    } else {
                        const err = await check.json();
                        alert(err.error || 'Ошибка');
                    }
                } catch (err) {
                    alert(err.message);
                }
            });

            // Личный чат
            privateChatBack.addEventListener('click', () => {
                if (currentPrivateRoom) leaveRoom(currentPrivateRoom.id);
                showInnerScreen('private-screen');
            });

            privateChatSend.addEventListener('click', () => {
                const text = privateChatInput.value.trim();
                if (text && currentRoom && currentRoom !== 'public') {
                    sendMessage(currentRoom, text);
                    privateChatInput.value = '';
                }
            });

            privateChatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    privateChatSend.click();
                }
            });

            // Удаление аккаунта
            document.getElementById('delete-account-btn').addEventListener('click', () => {
                modalTitle.textContent = 'Удалить аккаунт? Введите пароль';
                modalPassword.value = '';
                modalError.textContent = '';
                passwordModal.style.display = 'flex';
                modalConfirm.onclick = async () => {
                    const pwd = modalPassword.value.trim();
                    if (!pwd) return;
                    try {
                        const res = await fetch(API_BASE + '/api/delete-account', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: currentUser.username, password: pwd }) });
                        if (!res.ok) {
                            const err = await res.json();
                            modalError.textContent = err.error || 'Неверный пароль';
                            return;
                        }
                        localStorage.removeItem('chatxUser');
                        currentUser = null;
                        if (socket) socket.close();
                        passwordModal.style.display = 'none';
                        mainScreen.classList.add('screen-hidden');
                        authScreen.classList.remove('screen-hidden');
                    } catch (err) {
                        modalError.textContent = 'Ошибка сервера';
                    }
                };
                modalCancel.onclick = () => {
                    passwordModal.style.display = 'none';
                };
            });

            // Выход из аккаунта
            document.getElementById('logout-btn').addEventListener('click', () => {
                confirmModal.style.display = 'flex';
                confirmYes.onclick = () => {
                    localStorage.removeItem('chatxUser');
                    currentUser = null;
                    if (socket) socket.close();
                    confirmModal.style.display = 'none';
                    mainScreen.classList.add('screen-hidden');
                    authScreen.classList.remove('screen-hidden');
                };
                confirmNo.onclick = () => {
                    confirmModal.style.display = 'none';
                };
            });

            if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                Notification.requestPermission();
            }
        })();
    </script>
</body>
</html>
