<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatX</title>
    
    <!-- PWA метатеги -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ChatX">
    <meta name="theme-color" id="theme-color-meta" content="#4a3aff">
    <link rel="manifest" href="manifest.json">
    
    <!-- PeerJS, idb, Font Awesome -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/idb@7.1.1/build/umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        body {
            --bg-gradient-start: #e9e9f0;
            --bg-gradient-end: #dadde8;
            --container-bg: rgba(240, 240, 245, 0.7);
            --container-border: rgba(255,255,255,0.5);
            --text-primary: #1a1a2e;
            --text-secondary: #2c3e50;
            --text-muted: #6b6b80;
            --accent: #4a3aff;
            --accent-light: #7a6aff;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(255,255,255,0.6);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            --icon-bg: white;
            --panel-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(255, 255, 255, 0.5);
            --chat-own-bg: var(--accent);
            --chat-other-bg: #e0e0f0;
            --chat-own-text: white;
            --chat-other-text: #1a1a2e;
            transition: background 0.2s, color 0.2s;
            
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
        }

        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-bg: rgba(30, 30, 46, 0.8);
            --container-border: rgba(255,255,255,0.15);
            --text-primary: #f0f0ff;
            --text-secondary: #ecf0f1;
            --text-muted: #8a8aa0;
            --accent: #6d5fff;
            --accent-light: #9a8cff;
            --card-bg: rgba(40, 40, 55, 0.7);
            --card-border: rgba(255,255,255,0.1);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --icon-bg: #2a2a40;
            --panel-bg: rgba(30, 30, 46, 0.8);
            --input-bg: rgba(40, 40, 55, 0.6);
            --chat-other-bg: #3a3a5a;
            --chat-other-text: #ffffff;
        }

        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.3s;
        }

        .screen-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .login-screen {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .login-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            flex-shrink: 0;
            position: relative;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .theme-toggle {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 20px;
            position: absolute;
            right: 0;
            top: 0;
        }

        .theme-toggle:active {
            transform: scale(0.94);
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 16px;
            border: 1px solid var(--container-border);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .input-group input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            background: var(--icon-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .status {
            text-align: center;
            color: var(--text-muted);
            margin: 8px 0;
            font-size: 14px;
        }

        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-section {
            margin-bottom: 16px;
        }

        .history-section h4 {
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 16px;
        }

        .room-list {
            list-style: none;
            max-height: 150px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .room-item {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 8px 12px;
            margin-bottom: 4px;
            border: 1px solid var(--card-border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-item:active {
            background: var(--card-border);
        }

        .room-name {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .room-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .room-date {
            color: var(--text-muted);
            font-size: 12px;
        }

        .room-unread {
            background: var(--accent);
            color: white;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .delete-room-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            margin-left: 4px;
        }

        .delete-room-btn:active {
            color: var(--accent);
        }

        .chat-screen {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: max(24px, env(safe-area-inset-top)) 16px 12px 16px;
            border-bottom: 1px solid var(--container-border);
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .chat-header-left .theme-toggle {
            width: 40px;
            height: 40px;
            font-size: 18px;
            position: static;
        }

        .chat-room-id {
            background: var(--input-bg);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            border: 1px solid var(--card-border);
            cursor: pointer;
        }

        .chat-room-id:active {
            background: var(--card-bg);
        }

        .my-username {
            background: var(--icon-bg);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--card-border);
        }

        .participant-count {
            background: var(--icon-bg);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--card-border);
        }

        .chat-exit-btn {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 22px;
        }

        .chat-exit-btn:active {
            transform: scale(0.94);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            margin-bottom: 4px;
        }

        .message-own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            background: var(--chat-other-bg);
            border-radius: 24px;
            padding: 10px 16px;
            border: 1px solid var(--card-border);
            word-break: break-word;
            color: var(--chat-other-text);
        }

        .message-bubble-own {
            background: var(--chat-own-bg);
            color: var(--chat-own-text);
            border-color: var(--accent-light);
        }

        .message-sender {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent);
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--container-border);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .chat-input-area textarea {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
            resize: none;
            min-height: 48px;
            max-height: 120px;
        }

        .chat-input-area button {
            width: 48px;
            height: 48px;
            border-radius: 30px;
            padding: 0;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <!-- Экран входа -->
    <div class="screen login-screen" id="login-screen">
        <div class="login-header">
            <h1>ChatX</h1>
            <div class="theme-toggle" id="login-theme-toggle">
                <i class="fas fa-sun"></i>
            </div>
        </div>

        <div class="panel">
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Имя пользователя">
            </div>
            <div class="input-group">
                <input type="text" id="room-id-input" placeholder="ID комнаты (латиница, цифры, дефис, _)">
            </div>
            <div class="flex-col">
                <button class="btn" id="connect-btn">Подключиться</button>
                <button class="btn btn-primary" id="create-peer-btn">➕ Создать комнату</button>
            </div>
            <div id="connection-status" class="status">Не подключено</div>
            <div id="debug-info" class="status" style="color: var(--accent); font-size: 12px;"></div>
        </div>

        <!-- История комнат -->
        <div class="panel history-section">
            <h4>Недавние комнаты</h4>
            <ul id="room-history-list" class="room-list"></ul>
        </div>
    </div>

    <!-- Экран чата -->
    <div class="screen chat-screen screen-hidden" id="chat-screen">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="theme-toggle" id="chat-theme-toggle">
                    <i class="fas fa-sun"></i>
                </div>
                <div class="chat-room-id" id="chat-room-id" title="Нажмите, чтобы скопировать ID">—</div>
                <div class="my-username" id="my-username"></div>
                <div class="participant-count" id="participant-count">1</div>
            </div>
            <div class="chat-exit-btn" id="chat-exit-btn" title="Выйти из комнаты">
                <i class="fas fa-times"></i>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input-area">
            <textarea id="chat-input" rows="1" placeholder="Написать..."></textarea>
            <button class="btn btn-primary" id="send-chat-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        (function() {
            // --- Тема ---
            const themeToggles = [
                document.getElementById('login-theme-toggle'),
                document.getElementById('chat-theme-toggle')
            ];
            const themeIcons = themeToggles.map(t => t.querySelector('i'));
            let currentTheme = localStorage.getItem('chatxTheme') || 'system';

            function setTheme(theme) {
                currentTheme = theme;
                localStorage.setItem('chatxTheme', theme);
                applyTheme();
            }

            function applyTheme() {
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                let isDark = false;
                if (currentTheme === 'dark') isDark = true;
                else if (currentTheme === 'system') isDark = systemDark;

                document.body.classList.toggle('dark', isDark);
                const iconClass = currentTheme === 'light' ? 'fas fa-sun' : (currentTheme === 'dark' ? 'fas fa-moon' : 'fas fa-circle-half-stroke');
                themeIcons.forEach(icon => icon.className = iconClass);
                
                const themeColorMeta = document.getElementById('theme-color-meta');
                if (themeColorMeta) {
                    themeColorMeta.setAttribute('content', isDark ? '#1a1a2e' : '#4a3aff');
                }
            }

            themeToggles.forEach(toggle => {
                toggle.addEventListener('click', () => {
                    if (currentTheme === 'light') setTheme('dark');
                    else if (currentTheme === 'dark') setTheme('system');
                    else setTheme('light');
                });
            });
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
            applyTheme();

            // --- IndexedDB (версия 2 с полем unreadCount) ---
            let dbPromise;
            const DB_NAME = 'ChatXDatabase';
            const DB_VERSION = 2;

            async function initDB() {
                dbPromise = await idb.openDB(DB_NAME, DB_VERSION, {
                    upgrade(db, oldVersion, newVersion, transaction) {
                        console.log(`Обновление БД с версии ${oldVersion} до ${newVersion}`);
                        
                        if (!db.objectStoreNames.contains('rooms')) {
                            const roomStore = db.createObjectStore('rooms', { keyPath: 'roomId' });
                            roomStore.createIndex('by-lastVisit', 'lastVisit');
                            // unreadCount будет добавлено при put
                        }
                        
                        if (!db.objectStoreNames.contains('messages')) {
                            const messageStore = db.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
                            messageStore.createIndex('by-room', 'roomId');
                            messageStore.createIndex('by-timestamp', 'timestamp');
                        }
                    },
                });
                console.log('База данных инициализирована (версия 2)');
            }
            initDB().catch(console.error);

            // --- Запрос разрешения на уведомления ---
            function requestNotificationPermission() {
                if (!("Notification" in window)) {
                    console.log("Этот браузер не поддерживает уведомления");
                    return;
                }
                if (Notification.permission === "granted") {
                    console.log("Уведомления уже разрешены");
                } else if (Notification.permission !== "denied") {
                    Notification.requestPermission().then(permission => {
                        console.log("Разрешение на уведомления:", permission);
                    });
                }
            }
            requestNotificationPermission();

            // --- Имя пользователя ---
            const usernameInput = document.getElementById('username-input');
            let myUsername = localStorage.getItem('chatxUsername') || 'Аноним';
            usernameInput.value = myUsername;
            usernameInput.addEventListener('change', () => {
                myUsername = usernameInput.value.trim() || 'Аноним';
                localStorage.setItem('chatxUsername', myUsername);
                const mySpan = document.getElementById('my-username');
                if (mySpan) mySpan.textContent = myUsername;
            });

            // --- Элементы ---
            const roomIdInput = document.getElementById('room-id-input');
            const connectBtn = document.getElementById('connect-btn');
            const createBtn = document.getElementById('create-peer-btn');
            const connectionStatus = document.getElementById('connection-status');
            const debugInfo = document.getElementById('debug-info');
            const loginScreen = document.getElementById('login-screen');
            const chatScreen = document.getElementById('chat-screen');
            const chatRoomId = document.getElementById('chat-room-id');
            const myUsernameSpan = document.getElementById('my-username');
            const participantCount = document.getElementById('participant-count');
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const sendChatBtn = document.getElementById('send-chat-btn');
            const chatExitBtn = document.getElementById('chat-exit-btn');
            const roomHistoryList = document.getElementById('room-history-list');

            // --- Состояние ---
            let peer = null;
            let connections = [];
            let activeConn = null;
            let isHost = false;
            let currentRoomId = null;

            // --- Вспомогательные ---
            function setDebug(msg) {
                debugInfo.textContent = msg;
                console.log('[DEBUG]', msg);
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // --- Функции для работы с базой данных ---
            async function saveMessage(roomId, sender, text, own) {
                const db = await dbPromise;
                await db.add('messages', {
                    roomId: roomId,
                    sender: sender,
                    text: text,
                    timestamp: new Date().toISOString(),
                    own: own,
                });
            }

            async function loadRoomHistory() {
                const db = await dbPromise;
                const rooms = await db.getAllFromIndex('rooms', 'by-lastVisit');
                if (!roomHistoryList) return;
                
                if (rooms.length === 0) {
                    roomHistoryList.innerHTML = '<li class="room-item" style="justify-content:center;">Нет истории</li>';
                    return;
                }
                
                // Сортируем по lastVisit (сначала новые)
                rooms.sort((a, b) => new Date(b.lastVisit) - new Date(a.lastVisit));
                
                roomHistoryList.innerHTML = rooms.map(room => `
                    <li class="room-item" data-roomid="${room.roomId}">
                        <span class="room-name">${room.roomId}</span>
                        <div class="room-meta">
                            <span class="room-date">${new Date(room.lastVisit).toLocaleDateString()}</span>
                            ${room.unreadCount ? `<span class="room-unread">${room.unreadCount}</span>` : ''}
                            <button class="delete-room-btn" onclick="event.stopPropagation(); window.deleteRoom('${room.roomId}')">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </li>
                `).join('');

                // Добавляем обработчики клика на элементы
                document.querySelectorAll('.room-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const rid = el.dataset.roomid;
                        if (rid) {
                            roomIdInput.value = rid;
                            connectBtn.click();
                        }
                    });
                });
            }

            // Глобальная функция удаления комнаты
            window.deleteRoom = async (roomId) => {
                const db = await dbPromise;
                // Удаляем комнату
                await db.delete('rooms', roomId);
                // Удаляем все сообщения этой комнаты
                const tx = db.transaction('messages', 'readwrite');
                const index = tx.store.index('by-room');
                let cursor = await index.openCursor(IDBKeyRange.only(roomId));
                while (cursor) {
                    cursor.delete();
                    cursor = await cursor.continue();
                }
                await tx.done;
                loadRoomHistory();
            };

            // --- Уведомление ---
            function showNotification(title, body, roomId) {
                if (!("Notification" in window) || Notification.permission !== "granted") {
                    return;
                }
                const notification = new Notification(title, {
                    body: body,
                    icon: '/icon.svg',
                    tag: roomId,
                    renotify: true,
                });
                notification.onclick = () => {
                    window.focus();
                    roomIdInput.value = roomId;
                    connectBtn.click();
                };
            }

            // --- Сохранение комнаты (с обновлением unreadCount) ---
            async function saveRoomVisit(roomId) {
                const db = await dbPromise;
                let room = await db.get('rooms', roomId);
                if (!room) {
                    room = { roomId: roomId, lastVisit: new Date().toISOString(), unreadCount: 0 };
                } else {
                    room.lastVisit = new Date().toISOString();
                    // При входе сбрасываем счётчик
                    room.unreadCount = 0;
                }
                await db.put('rooms', room);
                loadRoomHistory();
            }

            async function incrementUnreadCount(roomId) {
                const db = await dbPromise;
                let room = await db.get('rooms', roomId);
                if (room) {
                    room.unreadCount = (room.unreadCount || 0) + 1;
                    await db.put('rooms', room);
                    loadRoomHistory();
                }
            }

            // --- Добавление сообщения в чат (и сохранение) ---
            function addChatMessage(sender, text, own = false) {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${own ? 'message-own' : ''}`;

                const senderHtml = own ? '' : `<div class="message-sender">${escapeHtml(sender)}</div>`;
                msgDiv.innerHTML = `
                    <div class="message-bubble ${own ? 'message-bubble-own' : ''}">
                        ${senderHtml}
                        <div class="message-text">${escapeHtml(text)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function updateParticipantCount() {
                if (isHost) {
                    participantCount.textContent = connections.length + 1;
                } else {
                    participantCount.textContent = activeConn ? 2 : 1;
                }
            }

            function showChatScreen(roomId) {
                currentRoomId = roomId;
                chatRoomId.textContent = roomId;
                myUsernameSpan.textContent = myUsername;
                chatMessages.innerHTML = '';
                updateParticipantCount();
                loginScreen.classList.add('screen-hidden');
                chatScreen.classList.remove('screen-hidden');
                
                // Загружаем историю сообщений из БД
                (async () => {
                    const db = await dbPromise;
                    const index = db.transaction('messages').store.index('by-room');
                    const messages = await index.getAll(roomId);
                    messages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                    messages.forEach(msg => {
                        addChatMessage(msg.sender, msg.text, msg.own);
                    });
                })();

                // Сохраняем визит и сбрасываем счётчик
                saveRoomVisit(roomId);
            }

            function exitToLogin() {
                if (peer) {
                    peer.destroy();
                    peer = null;
                }
                connections = [];
                activeConn = null;
                isHost = false;
                currentRoomId = null;
                chatScreen.classList.add('screen-hidden');
                loginScreen.classList.remove('screen-hidden');
                connectionStatus.textContent = 'Не подключено';
                setDebug('');
                loadRoomHistory(); // обновляем список комнат
            }

            chatExitBtn.addEventListener('click', exitToLogin);

            chatRoomId.addEventListener('click', () => {
                if (currentRoomId) {
                    navigator.clipboard.writeText(currentRoomId).then(() => {
                        setDebug('✅ ID скопирован');
                        const original = connectionStatus.textContent;
                        connectionStatus.textContent = 'ID скопирован!';
                        setTimeout(() => { connectionStatus.textContent = original; }, 2000);
                    });
                }
            });

            // --- Настройка соединения ---
            function setupConnection(conn) {
                if (isHost) {
                    connections.push(conn);
                } else {
                    activeConn = conn;
                    connections.push(conn);
                }

                conn.on('open', () => {
                    connectionStatus.textContent = `✅ Подключено к ${conn.peer}`;
                    setDebug('Соединение установлено');
                    updateParticipantCount();
                });

                conn.on('data', (data) => {
                    // Ретрансляция для хоста
                    if (isHost && connections.length > 0) {
                        connections.forEach(otherConn => {
                            if (otherConn !== conn) {
                                otherConn.send(data);
                            }
                        });
                    }

                    if (data.type === 'text') {
                        // Получено сообщение
                        addChatMessage(data.sender, data.text, false);
                        
                        // Сохраняем в БД
                        if (currentRoomId) {
                            saveMessage(currentRoomId, data.sender, data.text, false);
                        }

                        // Если текущий чат не соответствует комнате отправителя или приложение не активно, увеличиваем счётчик и уведомляем
                        if (currentRoomId !== conn.peer || document.hidden) {
                            incrementUnreadCount(conn.peer);
                            showNotification(data.sender, data.text, conn.peer);
                        }
                    }
                });

                conn.on('close', () => {
                    const index = connections.indexOf(conn);
                    if (index !== -1) connections.splice(index, 1);
                    if (activeConn === conn) {
                        activeConn = null;
                        exitToLogin();
                    } else {
                        setDebug('Один из клиентов отключился');
                        updateParticipantCount();
                    }
                });

                conn.on('error', (err) => {
                    console.error(err);
                    setDebug(`Ошибка соединения: ${err.message}`);
                });
            }

            // --- Отправка всем ---
            function sendToAll(data) {
                if (activeConn) {
                    activeConn.send(data);
                } else if (connections.length > 0) {
                    connections.forEach(conn => conn.send(data));
                }
            }

            // --- Создание комнаты ---
            createBtn.addEventListener('click', () => {
                const roomId = roomIdInput.value.trim();
                if (!roomId) {
                    alert('Введите ID комнаты');
                    return;
                }
                if (!/^[a-zA-Z0-9_-]+$/.test(roomId)) {
                    alert('ID может содержать только латинские буквы, цифры, дефис и подчеркивание');
                    return;
                }

                if (peer) peer.destroy();
                connections = [];
                activeConn = null;
                isHost = true;

                setDebug('Создаём комнату...');
                const server = { host: 'venikshare-server.onrender.com', port: 443, path: '/', secure: true, key: 'peerjs' };
                const newPeer = new Peer(roomId, server);

                newPeer.on('open', (id) => {
                    peer = newPeer;
                    setDebug('✅ Комната создана, ID: ' + id);
                    showChatScreen(id);

                    newPeer.on('connection', (connection) => {
                        setupConnection(connection);
                    });
                });

                newPeer.on('error', (err) => {
                    setDebug('❌ Ошибка: ' + err.type);
                    if (err.type === 'id-taken') {
                        alert('Этот ID уже занят. Попробуйте другой.');
                    } else {
                        alert('Не удалось создать комнату: ' + err.type);
                    }
                });
            });

            // --- Подключение к комнате ---
            connectBtn.addEventListener('click', () => {
                const roomId = roomIdInput.value.trim();
                if (!roomId) {
                    alert('Введите ID комнаты');
                    return;
                }

                if (peer) peer.destroy();
                connections = [];
                activeConn = null;
                isHost = false;

                setDebug('Подключаемся...');
                const server = { host: 'venikshare-server.onrender.com', port: 443, path: '/', secure: true, key: 'peerjs' };
                const newPeer = new Peer(server);

                newPeer.on('open', () => {
                    peer = newPeer;
                    const conn = peer.connect(roomId);
                    setupConnection(conn);
                    showChatScreen(roomId);
                });

                newPeer.on('error', (err) => {
                    setDebug('❌ Ошибка: ' + err.type);
                    if (err.type === 'peer-unavailable') {
                        alert('Хост не в сети. Комната не существует или хост отключился.');
                    } else {
                        alert('Ошибка подключения: ' + err.type);
                    }
                });
            });

            // --- Отправка сообщения ---
            sendChatBtn.addEventListener('click', () => {
                const text = chatInput.value.trim();
                if (!text) return;

                sendToAll({ type: 'text', sender: myUsername, text });
                addChatMessage(myUsername, text, true);
                if (currentRoomId) {
                    saveMessage(currentRoomId, myUsername, text, true);
                }
                chatInput.value = '';
            });

            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendChatBtn.click();
                }
            });

            // --- Загрузка истории при старте ---
            (async () => {
                await initDB();
                loadRoomHistory();
            })();

            window.addEventListener('beforeunload', () => {
                if (peer) peer.destroy();
            });
        })();
    </script>
</body>
</html>
