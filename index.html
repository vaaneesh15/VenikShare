<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Веникшер</title>
    
    <!-- PWA метатеги -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Веникшер">
    <meta name="theme-color" id="theme-color-meta" content="#4a3aff">
    <link rel="manifest" href="manifest.json">
    
    <!-- PeerJS и Font Awesome -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* Стили без изменений (как в предыдущей версии) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        body {
            --bg-gradient-start: #e9e9f0;
            --bg-gradient-end: #dadde8;
            --container-bg: rgba(240, 240, 245, 0.7);
            --container-border: rgba(255,255,255,0.5);
            --text-primary: #1a1a2e;
            --text-secondary: #2c3e50;
            --text-muted: #6b6b80;
            --accent: #4a3aff;
            --accent-light: #7a6aff;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(255,255,255,0.6);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            --icon-bg: white;
            --panel-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(255, 255, 255, 0.5);
            --chat-own-bg: var(--accent);
            --chat-other-bg: #e0e0f0;
            --file-message-bg: rgba(74, 58, 255, 0.1);
            --chat-own-text: white;
            --chat-other-text: #1a1a2e;
            transition: background 0.2s, color 0.2s;
            
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
        }

        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-bg: rgba(30, 30, 46, 0.8);
            --container-border: rgba(255,255,255,0.15);
            --text-primary: #f0f0ff;
            --text-secondary: #ecf0f1;
            --text-muted: #8a8aa0;
            --accent: #6d5fff;
            --accent-light: #9a8cff;
            --card-bg: rgba(40, 40, 55, 0.7);
            --card-border: rgba(255,255,255,0.1);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --icon-bg: #2a2a40;
            --panel-bg: rgba(30, 30, 46, 0.8);
            --input-bg: rgba(40, 40, 55, 0.6);
            --chat-other-bg: #3a3a5a;
            --chat-other-text: #ffffff;
            --file-message-bg: rgba(106, 90, 255, 0.2);
        }

        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.3s;
        }

        .screen-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .login-screen {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .login-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-align: center;
            flex: 1;
        }

        .theme-toggle {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 20px;
        }

        .theme-toggle:active {
            transform: scale(0.94);
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 16px;
            border: 1px solid var(--container-border);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .input-group input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            background: var(--icon-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .status {
            text-align: center;
            color: var(--text-muted);
            margin: 8px 0;
            font-size: 14px;
        }

        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-screen {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: max(24px, env(safe-area-inset-top)) 16px 12px 16px;
            border-bottom: 1px solid var(--container-border);
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .chat-header-left .theme-toggle {
            width: 40px;
            height: 40px;
            font-size: 18px;
        }

        .chat-room-id {
            background: var(--input-bg);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            border: 1px solid var(--card-border);
            cursor: pointer;
        }

        .chat-room-id:active {
            background: var(--card-bg);
        }

        .my-username {
            background: var(--icon-bg);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--card-border);
        }

        .participant-count {
            background: var(--icon-bg);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--card-border);
        }

        .chat-exit-btn {
            background: var(--icon-bg);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 22px;
        }

        .chat-exit-btn:active {
            transform: scale(0.94);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            margin-bottom: 4px;
        }

        .message-own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            background: var(--chat-other-bg);
            border-radius: 24px;
            padding: 10px 16px;
            border: 1px solid var(--card-border);
            word-break: break-word;
            color: var(--chat-other-text);
        }

        .message-bubble-own {
            background: var(--chat-own-bg);
            color: var(--chat-own-text);
            border-color: var(--accent-light);
        }

        .message-sender {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent);
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .file-message {
            background: var(--file-message-bg);
            border: 1px dashed var(--accent);
            cursor: pointer;
            transition: background 0.2s;
        }

        .file-message:active {
            background: var(--accent-light);
            opacity: 0.8;
        }

        .file-message-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-message-icon {
            font-size: 24px;
            color: var(--accent);
        }

        .file-message-info {
            flex: 1;
        }

        .file-message-name {
            font-weight: 600;
            font-size: 14px;
        }

        .file-message-size {
            font-size: 12px;
            opacity: 0.7;
        }

        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--container-border);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .attach-btn {
            background: var(--icon-bg);
            width: 48px;
            height: 48px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid var(--container-border);
            color: var(--accent);
            font-size: 22px;
            flex-shrink: 0;
        }

        .attach-btn:active {
            transform: scale(0.94);
        }

        .chat-input-area textarea {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
            resize: none;
            min-height: 48px;
            max-height: 120px;
        }

        .chat-input-area button {
            width: 48px;
            height: 48px;
            border-radius: 30px;
            padding: 0;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Экран входа -->
    <div class="screen login-screen" id="login-screen">
        <div class="login-header">
            <h1>Веникшер</h1>
            <div class="theme-toggle" id="login-theme-toggle">
                <i class="fas fa-sun"></i>
            </div>
        </div>

        <div class="panel">
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Имя пользователя">
            </div>
            <div class="input-group">
                <input type="text" id="room-id-input" placeholder="ID комнаты (любые символы, до 20)">
            </div>
            <div class="input-group">
                <input type="password" id="room-password-input" placeholder="Пароль">
            </div>
            <div class="flex-col">
                <button class="btn" id="connect-btn">Подключиться</button>
                <button class="btn btn-primary" id="create-peer-btn">➕ Создать комнату</button>
            </div>
            <div id="connection-status" class="status">Не подключено</div>
            <div id="debug-info" class="status" style="color: var(--accent); font-size: 12px;"></div>
        </div>
    </div>

    <!-- Экран чата -->
    <div class="screen chat-screen screen-hidden" id="chat-screen">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="theme-toggle" id="chat-theme-toggle">
                    <i class="fas fa-sun"></i>
                </div>
                <div class="chat-room-id" id="chat-room-id" title="Нажмите, чтобы скопировать ID">—</div>
                <div class="my-username" id="my-username"></div>
                <div class="participant-count" id="participant-count">1</div>
            </div>
            <div class="chat-exit-btn" id="chat-exit-btn" title="Выйти из комнаты">
                <i class="fas fa-times"></i>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input-area">
            <div class="attach-btn" id="attach-btn" title="Прикрепить файл">
                <i class="fas fa-paperclip"></i>
            </div>
            <textarea id="chat-input" rows="1" placeholder="Написать..."></textarea>
            <button class="btn btn-primary" id="send-chat-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        <input type="file" id="file-input" multiple>
    </div>

    <script>
        (function() {
            // --- Глобальные переменные ---
            const API_BASE = 'https://venikshare-server.onrender.com';
            const peerServers = [{
                host: 'venikshare-server.onrender.com',
                port: 443,
                path: '/',
                secure: true,
                key: 'peerjs',
                debug: 0
            }];

            // --- Тема ---
            const themeToggles = [
                document.getElementById('login-theme-toggle'),
                document.getElementById('chat-theme-toggle')
            ];
            const themeIcons = themeToggles.map(t => t.querySelector('i'));
            let currentTheme = localStorage.getItem('venikshareTheme') || 'system';

            function setTheme(theme) {
                currentTheme = theme;
                localStorage.setItem('venikshareTheme', theme);
                applyTheme();
            }

            function applyTheme() {
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                let isDark = false;
                if (currentTheme === 'dark') isDark = true;
                else if (currentTheme === 'system') isDark = systemDark;

                document.body.classList.toggle('dark', isDark);
                const iconClass = currentTheme === 'light' ? 'fas fa-sun' : (currentTheme === 'dark' ? 'fas fa-moon' : 'fas fa-circle-half-stroke');
                themeIcons.forEach(icon => icon.className = iconClass);
                
                const themeColorMeta = document.getElementById('theme-color-meta');
                if (themeColorMeta) {
                    themeColorMeta.setAttribute('content', isDark ? '#1a1a2e' : '#4a3aff');
                }
            }

            themeToggles.forEach(toggle => {
                toggle.addEventListener('click', () => {
                    if (currentTheme === 'light') setTheme('dark');
                    else if (currentTheme === 'dark') setTheme('system');
                    else setTheme('light');
                });
            });
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
            applyTheme();

            // --- Имя пользователя ---
            const usernameInput = document.getElementById('username-input');
            let myUsername = localStorage.getItem('venikshareUsername') || 'Аноним';
            usernameInput.value = myUsername;
            usernameInput.addEventListener('change', () => {
                myUsername = usernameInput.value.trim() || 'Аноним';
                localStorage.setItem('venikshareUsername', myUsername);
                const mySpan = document.getElementById('my-username');
                if (mySpan) mySpan.textContent = myUsername;
            });

            // --- Элементы экрана входа ---
            const roomIdInput = document.getElementById('room-id-input');
            const roomPasswordInput = document.getElementById('room-password-input');
            const connectBtn = document.getElementById('connect-btn');
            const createBtn = document.getElementById('create-peer-btn');
            const connectionStatus = document.getElementById('connection-status');
            const debugInfo = document.getElementById('debug-info');

            // --- Элементы экрана чата ---
            const loginScreen = document.getElementById('login-screen');
            const chatScreen = document.getElementById('chat-screen');
            const chatRoomId = document.getElementById('chat-room-id');
            const myUsernameSpan = document.getElementById('my-username');
            const participantCount = document.getElementById('participant-count');
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const sendChatBtn = document.getElementById('send-chat-btn');
            const attachBtn = document.getElementById('attach-btn');
            const fileInput = document.getElementById('file-input');
            const chatExitBtn = document.getElementById('chat-exit-btn');

            // --- Состояние ---
            let peer = null;
            let connections = []; // список всех соединений (для хоста) и клиента (активное)
            let activeConn = null; // для клиента (единственное соединение)
            let isHost = false;
            let currentRoomId = null;
            const fileBuffers = new Map(); // для сборки файлов
            // Следим за статусом соединений (открыто/закрыто)
            const connectionOpen = new Map(); // conn -> boolean

            function setDebug(message) {
                debugInfo.textContent = message;
                console.log('[DEBUG]', message);
            }

            function updateParticipantCount() {
                if (isHost) {
                    participantCount.textContent = connections.length + 1;
                } else {
                    participantCount.textContent = activeConn ? 2 : 1;
                }
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            function getFileIcon(fileName) {
                const ext = fileName.split('.').pop().toLowerCase();
                if (['png','jpg','jpeg','gif','bmp','webp','svg'].includes(ext)) return 'fa-image';
                if (['mp4','mov','avi','mkv','webm','flv','wmv'].includes(ext)) return 'fa-video';
                if (['mp3','flac','wav','aac','ogg','m4a'].includes(ext)) return 'fa-music';
                if (['txt','pdf','doc','docx','rtf','md','csv','json','xml','html','css','js','ts'].includes(ext)) return 'fa-file-alt';
                return 'fa-file';
            }

            function addChatMessage(sender, text, own = false, isFile = false, fileData = null) {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${own ? 'message-own' : ''}`;

                if (isFile && fileData) {
                    const senderHtml = own ? '' : `<div class="message-sender">${escapeHtml(sender)}</div>`;
                    msgDiv.innerHTML = `
                        <div class="message-bubble file-message ${own ? 'message-bubble-own' : ''}" data-file="${fileData.id}">
                            ${senderHtml}
                            <div class="file-message-content">
                                <div class="file-message-icon"><i class="fas ${getFileIcon(fileData.name)}"></i></div>
                                <div class="file-message-info">
                                    <div class="file-message-name">${escapeHtml(fileData.name)}</div>
                                    <div class="file-message-size">${(fileData.size / 1024).toFixed(1)} KB</div>
                                </div>
                            </div>
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                    const bubble = msgDiv.querySelector('.message-bubble');
                    bubble.addEventListener('click', () => {
                        if (fileData.blob) {
                            const url = URL.createObjectURL(fileData.blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = fileData.name;
                            a.click();
                            URL.revokeObjectURL(url);
                        }
                    });
                } else {
                    const senderHtml = own ? '' : `<div class="message-sender">${escapeHtml(sender)}</div>`;
                    msgDiv.innerHTML = `
                        <div class="message-bubble ${own ? 'message-bubble-own' : ''}">
                            ${senderHtml}
                            <div class="message-text">${escapeHtml(text)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                }
                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function showChatScreen(roomId) {
                currentRoomId = roomId;
                chatRoomId.textContent = roomId;
                myUsernameSpan.textContent = myUsername;
                chatMessages.innerHTML = '';
                updateParticipantCount();
                loginScreen.classList.add('screen-hidden');
                chatScreen.classList.remove('screen-hidden');
            }

            function exitToLogin() {
                if (peer) {
                    peer.destroy();
                    peer = null;
                }
                connections = [];
                activeConn = null;
                isHost = false;
                currentRoomId = null;
                fileBuffers.clear();
                connectionOpen.clear();
                chatScreen.classList.add('screen-hidden');
                loginScreen.classList.remove('screen-hidden');
                connectionStatus.textContent = 'Не подключено';
                setDebug('');
            }

            chatExitBtn.addEventListener('click', exitToLogin);

            chatRoomId.addEventListener('click', () => {
                if (currentRoomId) {
                    navigator.clipboard.writeText(currentRoomId).then(() => {
                        setDebug('✅ ID скопирован');
                        const original = connectionStatus.textContent;
                        connectionStatus.textContent = 'ID скопирован!';
                        setTimeout(() => { connectionStatus.textContent = original; }, 2000);
                    });
                }
            });

            // --- Настройка соединения ---
            function setupConnection(conn) {
                // Добавляем в список соединений
                if (isHost) {
                    connections.push(conn);
                    setDebug(`Новый клиент подключается. Всего клиентов: ${connections.length}`);
                } else {
                    activeConn = conn;
                    connections.push(conn);
                }

                // Изначально соединение не открыто
                connectionOpen.set(conn, false);

                conn.on('open', () => {
                    connectionStatus.textContent = `✅ Подключено к ${conn.peer}`;
                    setDebug('Соединение установлено');
                    connectionOpen.set(conn, true);
                    updateParticipantCount();
                });

                conn.on('data', (data) => {
                    // Ретрансляция для хоста
                    if (isHost && connections.length > 0) {
                        connections.forEach(otherConn => {
                            if (otherConn !== conn && connectionOpen.get(otherConn)) {
                                otherConn.send(data);
                            }
                        });
                    }

                    // Обработка данных
                    if (data.type === 'file-meta') {
                        const fileId = data.fileId;
                        fileBuffers.set(fileId, {
                            name: data.name,
                            size: data.size,
                            type: data.type,
                            chunks: [],
                            receivedSize: 0,
                            sender: data.sender || 'Аноним'
                        });
                    } else if (data.type === 'file-chunk') {
                        const fileId = data.fileId;
                        const fileData = fileBuffers.get(fileId);
                        if (fileData) {
                            fileData.chunks.push(data.data);
                            fileData.receivedSize += data.data.byteLength;
                        }
                    } else if (data.type === 'file-end') {
                        const fileId = data.fileId;
                        const fileData = fileBuffers.get(fileId);
                        if (fileData) {
                            const blob = new Blob(fileData.chunks, { type: fileData.type });
                            addChatMessage(fileData.sender, '', false, true, {
                                name: fileData.name,
                                size: fileData.size,
                                blob: blob,
                                id: fileId
                            });
                            fileBuffers.delete(fileId);
                        }
                    } else if (data.type === 'text') {
                        addChatMessage(data.sender, data.text, false);
                    }
                });

                conn.on('close', () => {
                    const index = connections.indexOf(conn);
                    if (index !== -1) connections.splice(index, 1);
                    connectionOpen.delete(conn);
                    if (activeConn === conn) {
                        activeConn = null;
                        exitToLogin();
                    } else {
                        setDebug('Один из клиентов отключился');
                        updateParticipantCount();
                    }
                });

                conn.on('error', (err) => {
                    console.error(err);
                    setDebug(`Ошибка соединения: ${err.message}`);
                });
            }

            // --- Отправка данных только по открытым соединениям ---
            function sendToAll(data) {
                if (activeConn) {
                    if (connectionOpen.get(activeConn)) {
                        activeConn.send(data);
                    } else {
                        setDebug('⚠️ Соединение ещё не открыто, сообщение не отправлено');
                    }
                } else if (connections.length > 0) {
                    connections.forEach(conn => {
                        if (connectionOpen.get(conn)) {
                            conn.send(data);
                        }
                    });
                }
                // Если никого нет, ничего не отправляем
            }

            // --- Создание комнаты ---
            createBtn.addEventListener('click', async () => {
                const roomId = roomIdInput.value.trim();
                const password = roomPasswordInput.value.trim();

                if (!roomId || !password) {
                    alert('Введите ID и пароль');
                    return;
                }
                if (roomId.length > 20) {
                    alert('ID слишком длинный (макс. 20 символов)');
                    return;
                }

                setDebug('🔄 Регистрация комнаты на сервере...');
                try {
                    const response = await fetch(`${API_BASE}/api/rooms`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ roomId, password })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error || 'Ошибка сервера');

                    setDebug('✅ Комната зарегистрирована, создаём пир...');
                    if (peer) peer.destroy();
                    connections = [];
                    activeConn = null;
                    isHost = true;
                    fileBuffers.clear();
                    connectionOpen.clear();

                    const server = peerServers[0];
                    const newPeer = new Peer(roomId, server);

                    newPeer.on('open', (id) => {
                        peer = newPeer;
                        setDebug('✅ Комната создана. ID: ' + id);
                        showChatScreen(id);

                        newPeer.on('connection', (connection) => {
                            setupConnection(connection);
                        });

                        newPeer.on('error', (err) => {
                            console.error(err);
                            connectionStatus.textContent = 'Ошибка: ' + err.type;
                            setDebug(`Ошибка пира: ${err.type} — ${err.message}`);
                        });
                    });

                    newPeer.on('error', (err) => {
                        if (err.type === 'id-taken') {
                            setDebug(`❌ ID ${roomId} уже занят на сервере PeerJS.`);
                            alert('Этот ID уже используется. Возможно, комната уже активна.');
                        } else {
                            setDebug(`❌ Ошибка при создании пира: ${err.type} — ${err.message}`);
                        }
                    });

                } catch (err) {
                    setDebug('❌ ' + err.message);
                    alert(err.message);
                }
            });

            // --- Подключение к комнате ---
            connectBtn.addEventListener('click', async () => {
                const roomId = roomIdInput.value.trim();
                const password = roomPasswordInput.value.trim();

                if (!roomId || !password) {
                    alert('Введите ID и пароль');
                    return;
                }

                setDebug('🔄 Проверка комнаты на сервере...');
                try {
                    const response = await fetch(`${API_BASE}/api/rooms/check`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ roomId, password })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        if (response.status === 404) throw new Error('Комната не найдена. Возможно, она не создана или истек срок действия.');
                        if (response.status === 401) throw new Error('Неверный пароль');
                        throw new Error(data.error || 'Ошибка сервера');
                    }

                    setDebug('✅ Комната существует, подключаемся к пиру...');
                    if (peer) peer.destroy();
                    connections = [];
                    activeConn = null;
                    isHost = false;
                    fileBuffers.clear();
                    connectionOpen.clear();

                    const server = peerServers[0];
                    const newPeer = new Peer(server);

                    newPeer.on('open', () => {
                        peer = newPeer;
                        const conn = peer.connect(roomId);
                        setupConnection(conn);
                        showChatScreen(roomId);
                    });

                    newPeer.on('error', (err) => {
                        console.error(err);
                        if (err.type === 'peer-unavailable') {
                            connectionStatus.textContent = '❌ Хост не в сети';
                            setDebug('Пир не найден. Возможно, хост отключился.');
                        } else {
                            connectionStatus.textContent = 'Ошибка подключения';
                            setDebug(`Ошибка пира: ${err.type} — ${err.message}`);
                        }
                    });

                } catch (err) {
                    setDebug('❌ ' + err.message);
                    alert(err.message);
                }
            });

            // --- Отправка текста ---
            sendChatBtn.addEventListener('click', () => {
                const text = chatInput.value.trim();
                if (!text) return;

                sendToAll({ type: 'text', sender: myUsername, text });
                addChatMessage(myUsername, text, true);
                chatInput.value = '';
            });

            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendChatBtn.click();
                }
            });

            // --- Отправка файлов ---
            attachBtn.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                for (const file of files) {
                    const fileId = Math.random().toString(36).substring(2) + Date.now();

                    // Определяем получателей (только открытые соединения)
                    const targets = activeConn 
                        ? (connectionOpen.get(activeConn) ? [activeConn] : [])
                        : connections.filter(conn => connectionOpen.get(conn));

                    // Отправляем, если есть открытые соединения
                    if (targets.length > 0) {
                        targets.forEach(conn => {
                            conn.send({
                                type: 'file-meta',
                                fileId: fileId,
                                name: file.name,
                                size: file.size,
                                type: file.type,
                                sender: myUsername
                            });
                        });

                        const chunkSize = 16384;
                        let offset = 0;

                        while (offset < file.size) {
                            const chunk = file.slice(offset, offset + chunkSize);
                            const buffer = await chunk.arrayBuffer();
                            targets.forEach(conn => {
                                conn.send({
                                    type: 'file-chunk',
                                    fileId: fileId,
                                    data: buffer
                                });
                            });
                            offset += chunkSize;
                            await new Promise(r => setTimeout(r, 10));
                        }

                        targets.forEach(conn => {
                            conn.send({
                                type: 'file-end',
                                fileId: fileId
                            });
                        });
                    } else if (!activeConn && connections.length === 0) {
                        setDebug('ℹ️ Нет подключений, файл сохранён локально');
                    } else {
                        setDebug('⚠️ Нет открытых соединений, файл сохранён локально');
                    }

                    // Добавляем в свой чат
                    const blob = new Blob([await file.arrayBuffer()], { type: file.type });
                    addChatMessage(myUsername, '', true, true, {
                        name: file.name,
                        size: file.size,
                        blob: blob,
                        id: fileId
                    });
                }

                fileInput.value = '';
            });

            window.addEventListener('beforeunload', () => {
                if (peer) peer.destroy();
            });
        })();
    </script>
</body>
</html>
